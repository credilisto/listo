<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión CrediListo | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; --green: #3aef9b; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .card-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 2rem; text-align: center; }
        .input-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 0.8rem; border-radius: 1rem; color: white; outline: none; font-size: 0.9rem; }
        .input-admin:focus { border-color: var(--cyan); }
        .label-admin { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-left: 0.5rem; margin-bottom: 0.2rem; display: block; }
    </style>
</head>
<body class="pb-20">

    <nav class="w-full py-6 px-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#050b16]/90 backdrop-blur-md z-50">
        <img src="logocredi.png" class="h-8 opacity-80" style="mix-blend-mode: lighten;">
        <a href="detalles.html" class="bg-cyan-500 text-black px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest">Gestionar Pagos →</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 mt-10">
        
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="card-stat">
                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Dinero en Calle</p>
                <p id="stat-calle" class="text-2xl font-black italic mt-1">$0.00</p>
            </div>
            <div class="card-stat">
                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Ganancia</p>
                <p id="stat-ganancia" class="text-2xl font-black italic text-green-400 mt-1">$0.00</p>
            </div>
            <div class="card-stat">
                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Cobrado Hoy</p>
                <p id="stat-hoy" class="text-2xl font-black italic text-cyan-400 mt-1">$0.00</p>
            </div>
            <div class="card-stat">
                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">En Deuda</p>
                <p id="stat-deuda" class="text-2xl font-black italic text-red-400 mt-1">$0.00</p>
            </div>
        </section>

        <section class="mb-12">
            <details class="group bg-white/5 rounded-[30px] border border-white/10 overflow-hidden shadow-2xl">
                <summary class="list-none p-6 cursor-pointer flex justify-between items-center">
                    <span class="font-black uppercase italic tracking-tighter text-lg text-cyan-400">+ Registro Manual Completo</span>
                    <span class="transition-transform group-open:rotate-180">▼</span>
                </summary>
                <div class="p-8 border-t border-white/5 space-y-6 bg-white/[0.01]">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label class="label-admin">Nombre Completo</label><input type="text" id="m_nombre" class="input-admin"></div>
                        <div><label class="label-admin">DUI</label><input type="text" id="m_dui" class="input-admin"></div>
                        <div><label class="label-admin">WhatsApp</label><input type="tel" id="m_tel" class="input-admin"></div>
                    </div>
                    <div><label class="label-admin">Dirección de Casa</label><input type="text" id="m_casa" class="input-admin"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="label-admin">Negocio o Rubro</label><input type="text" id="m_rubro" class="input-admin"></div>
                        <div><label class="label-admin">Propósito del Crédito</label><input type="text" id="m_proposito" class="input-admin"></div>
                    </div>
                    <div><label class="label-admin">Dirección del Negocio</label><input type="text" id="m_dir_negocio" class="input-admin"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-cyan-500/5 rounded-2xl border border-cyan-500/10">
                        <div><label class="label-admin text-cyan-400">Nombre Referencia</label><input type="text" id="m_ref_nombre" class="input-admin"></div>
                        <div><label class="label-admin text-cyan-400">Teléfono Referencia</label><input type="tel" id="m_ref_tel" class="input-admin"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-white/5 pt-4">
                        <div><label class="label-admin">Asignar Contraseña</label><input type="password" id="m_pass" class="input-admin"></div>
                        <div><label class="label-admin italic text-white">Foto Contrato</label><input type="file" class="input-admin text-[10px]"></div>
                        <div><label class="label-admin italic text-white">Letra de Cambio</label><input type="file" class="input-admin text-[10px]"></div>
                    </div>
                    <button class="w-full py-5 bg-white text-black font-black uppercase tracking-[0.2em] rounded-2xl">Guardar Nuevo Cliente</button>
                </div>
            </details>
        </section>

        <section class="space-y-6">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 ml-4">Solicitudes Entrantes</h2>
            <div id="lista-solicitudes" class="grid grid-cols-1 gap-4">
                </div>
        </section>
    </main>

    <div id="modalSolicitud" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="bg-[#050b16] w-full max-w-2xl rounded-[40px] border border-white/10 p-8 overflow-y-auto max-h-[90vh] shadow-2xl shadow-cyan-500/10">
            <div id="contenidoModal" class="space-y-6 text-sm">
                </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-10">
                <button onclick="aprobar()" class="bg-green-500 text-black font-black p-4 rounded-2xl text-[10px] uppercase">Aprobar</button>
                <button onclick="rechazar()" class="bg-orange-500 text-black font-black p-4 rounded-2xl text-[10px] uppercase">Observar</button>
                <button onclick="eliminar()" class="bg-red-600 text-white font-black p-4 rounded-2xl text-[10px] uppercase">Eliminar</button>
                <button onclick="cerrarModal()" class="bg-slate-800 text-white font-black p-4 rounded-2xl text-[10px] uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE (Asegúrate que coincida con tu proyecto de GitHub/Hosting)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "credilisto-sm.firebaseapp.com",
            projectId: "credilisto-sm",
            storageBucket: "credilisto-sm.appspot.com",
            messagingSenderId: "XXXXXXXX",
            appId: "XXXXXXXX"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LECTURA DE SOLICITUDES (onSnapshot lee los datos que ya existen)
        db.collection("solicitudes").orderBy("fecha", "desc").onSnapshot((snapshot) => {
            const contenedor = document.getElementById("lista-solicitudes");
            contenedor.innerHTML = "";
            
            if (snapshot.empty) {
                contenedor.innerHTML = "<p class='text-center text-slate-700 italic py-10'>No hay solicitudes nuevas.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const s = doc.data();
                contenedor.innerHTML += `
                    <div onclick="abrirSolicitud('${doc.id}')" class="p-6 bg-white/5 border border-white/5 rounded-[25px] flex justify-between items-center hover:border-cyan-500/50 transition-all cursor-pointer">
                        <div>
                            <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest mb-1 italic">${s.rubro || 'Sin rubro'}</p>
                            <h3 class="text-lg font-black italic uppercase">${s.nombre}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">DUI: ${s.dui} | Propósito: ${s.proposito || 'No especificado'}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-cyan-500 text-2xl">→</span>
                        </div>
                    </div>
                `;
            });
        });

        async function abrirSolicitud(id) {
            const doc = await db.collection("solicitudes").doc(id).get();
            const s = doc.data();
            const modal = document.getElementById("modalSolicitud");
            const contenido = document.getElementById("contenidoModal");

            contenido.innerHTML = `
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-black italic uppercase text-cyan-400">${s.nombre}</h2>
                    <p class="text-xs font-bold text-slate-500">SOLICITUD ID: ${id}</p>
                </div>
                <div class="grid grid-cols-2 gap-6 border-t border-white/5 pt-6">
                    <div><p class="label-admin">DUI</p><p class="font-black">${s.dui}</p></div>
                    <div><p class="label-admin">Teléfono</p><p class="font-black">${s.telefono}</p></div>
                    <div class="col-span-2"><p class="label-admin">Dirección Casa</p><p class="font-black text-xs">${s.direccion_casa}</p></div>
                    <div><p class="label-admin">Negocio</p><p class="font-black">${s.rubro}</p></div>
                    <div class="col-span-2"><p class="label-admin">Dirección Negocio</p><p class="font-black text-xs">${s.direccion_negocio}</p></div>
                    <div class="col-span-2"><p class="label-admin">Propósito</p><p class="font-black italic text-cyan-400">"${s.proposito}"</p></div>
                    <div class="col-span-2 p-4 bg-white/5 rounded-2xl border border-white/10">
                        <p class="label-admin text-cyan-400">Referencia Personal</p>
                        <p class="font-black">${s.referencia?.nombre || 'N/A'} — <span class="text-slate-400">${s.referencia?.tel || ''}</span></p>
                    </div>
                </div>
            `;
            modal.style.display = "flex";
        }

        function cerrarModal() { document.getElementById("modalSolicitud").style.display = "none"; }
    </script>
</body>
</html>
