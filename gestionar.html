<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #f8fafc; }
        body { background-color: var(--bg); color: #1e293b; font-family: 'Inter', sans-serif; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-field { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 0.7rem; border-radius: 0.8rem; width: 100%; color: #0f172a; font-size: 0.9rem; outline: none; }
        .input-field:focus { border-color: var(--primary); background: white; }
        .label-field { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 0.3rem; display: block; }
        #admin-content { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="lock-screen" class="fixed inset-0 bg-white z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 mb-6">Acceso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="PIN" class="w-full py-4 bg-slate-100 border border-slate-200 rounded-2xl text-center text-xl tracking-[0.5em] outline-none mb-4">
            <button onclick="verificarAcceso()" class="w-full py-4 bg-sky-600 text-white font-black uppercase rounded-2xl shadow-lg shadow-sky-200">Entrar al Sistema</button>
        </div>
    </div>

    <div id="admin-content">
        <nav class="p-4 bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="font-black italic text-sky-600 uppercase tracking-tighter text-xl">CrediListo Admin</h1>
                <button onclick="location.href='detalles.html'" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Gestión de Pagos →</button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 mt-6">
            
            <section class="mb-10">
                <details id="form-manual" class="card overflow-hidden">
                    <summary class="p-6 cursor-pointer font-black uppercase text-sky-600 list-none flex justify-between items-center">
                        <span>+ NUEVO REGISTRO MANUAL</span>
                        <span class="text-xs bg-sky-50 px-3 py-1 rounded-full italic">Abrir Formulario</span>
                    </summary>
                    <div class="p-6 border-t border-slate-100 space-y-4 bg-slate-50/50">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-field">Nombre</label><input type="text" id="m_nombre" class="input-field"></div>
                            <div><label class="label-field">DUI</label><input type="text" id="m_dui" class="input-field"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-field">WhatsApp</label><input type="tel" id="m_tel" class="input-field"></div>
                            <div><label class="label-field">Clave para el Cliente</label><input type="text" id="m_pass" value="1234" class="input-field"></div>
                        </div>

                        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                            <label class="label-field text-sky-600">Configuración del Crédito</label>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                <div>
                                    <label class="label-field">Monto</label>
                                    <select id="m_monto" onchange="calcularCuotaRapida()" class="input-field">
                                        <option value="50">50 USD</option>
                                        <option value="100">100 USD</option>
                                        <option value="150">150 USD</option>
                                        <option value="200">200 USD</option>
                                        <option value="250">250 USD</option>
                                        <option value="300">300 USD</option>
                                        <option value="400">400 USD</option>
                                        <option value="500">500 USD</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="label-field">Frecuencia</label>
                                    <select id="m_frecuencia" onchange="calcularCuotaRapida()" class="input-field">
                                        <option value="diario">Diario (30 pagos)</option>
                                        <option value="semanal">Semanal (4 pagos)</option>
                                    </select>
                                </div>
                            </div>
                            <div id="resultado-calculo" class="mt-4 p-3 bg-sky-50 rounded-xl text-center">
                                <p class="text-[10px] font-bold text-sky-700 uppercase">La cuota será de:</p>
                                <p id="texto-cuota" class="text-xl font-black text-sky-600">$0.00</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-field">Dirección Casa</label><input type="text" id="m_dirCasa" class="input-field"></div>
                            <div><label class="label-field">Nombre Negocio</label><input type="text" id="m_negocio" class="input-field"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-field">Dirección Negocio</label><input type="text" id="m_dirNeg" class="input-field"></div>
                            <div><label class="label-field">Sueldo / Ingresos</label><input type="text" id="m_ingresos" class="input-field"></div>
                        </div>
                        <div><label class="label-field">Inversión (Para qué es el dinero)</label><input type="text" id="m_inversion" class="input-field"></div>
                        
                        <div class="grid grid-cols-2 gap-4 bg-sky-100/30 p-4 rounded-2xl">
                            <div><label class="label-field">Referencia (Nombre)</label><input type="text" id="m_refNom" class="input-field"></div>
                            <div><label class="label-field">Referencia (Tel)</label><input type="tel" id="m_refTel" class="input-field"></div>
                        </div>

                        <button onclick="guardarNuevoManual()" class="w-full py-5 bg-sky-600 text-white font-black uppercase rounded-2xl shadow-lg shadow-sky-100">Registrar Solicitud</button>
                    </div>
                </details>
            </section>

            <section class="space-y-4">
                <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 px-4">Solicitudes Pendientes</h2>
                <div id="lista-solicitudes" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="modalS" class="fixed inset-0 z-[300] hidden bg-white overflow-y-auto">
        <div class="max-w-3xl mx-auto p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 italic uppercase">Revisión de Solicitud</h2>
                <button onclick="cerrarM()" class="bg-slate-100 p-3 rounded-full text-slate-500">✕</button>
            </div>
            
            <div id="modal-body" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                </div>

            <div class="grid grid-cols-2 gap-4 pb-10">
                <button onclick="aprobarCredito()" class="bg-green-500 text-white font-black py-5 rounded-2xl uppercase">Aprobar Crédito</button>
                <button onclick="eliminarS()" class="bg-red-50 text-red-500 font-black py-5 rounded-2xl uppercase">Rechazar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", projectId: "credilistosv" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        function verificarAcceso() {
            if(document.getElementById('admin-pass').value === "2025") {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
                calcularCuotaRapida();
                conectarFirebase();
            } else { alert("PIN Incorrecto"); document.getElementById('admin-pass').value = ""; }
        }

        function calcularCuotaRapida() {
            const m = parseFloat(document.getElementById('m_monto').value);
            const f = document.getElementById('m_frecuencia').value;
            const total = m + (m * 0.20);
            const cuota = f === 'diario' ? (total / 30) : (total / 4);
            document.getElementById('texto-cuota').innerText = `$${cuota.toFixed(2)} ${f}`;
        }

        function conectarFirebase() {
            db.ref('clientes').on('value', (snap) => {
                const container = document.getElementById('lista-solicitudes');
                container.innerHTML = "";
                snap.forEach((child) => {
                    const s = child.val();
                    if (s.tipo === "PENDIENTE") {
                        container.innerHTML += `
                            <div onclick="abrirS('${child.key}')" class="card p-5 flex justify-between items-center cursor-pointer hover:border-sky-400 transition-all">
                                <div>
                                    <h3 class="font-black uppercase text-slate-800">${s.nombre}</h3>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase">$${s.monto} | ${s.frecuencia} | DUI: ${s.dui}</p>
                                </div>
                                <span class="text-sky-500 font-black text-xs italic underline">REVISAR</span>
                            </div>`;
                    }
                });
            });
        }

        async function abrirS(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();
            
            // Ficha con TODOS los campos
            document.getElementById('modal-body').innerHTML = `
                <div class="col-span-full bg-sky-50 p-4 rounded-2xl mb-2">
                    <p class="label-field text-sky-600 text-center">Datos del Solicitante</p>
                    <h2 class="text-xl font-black text-center uppercase">${s.nombre}</h2>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">DUI</label>${s.dui}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">WhatsApp</label>${s.tel}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Dir. Vivienda</label>${s.dirCasa || s.dirVivienda || 'No especificada'}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Negocio</label>${s.negocio || 'Sin nombre'}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Dir. Negocio</label>${s.dirNeg || s.dirNegocio || 'No especificada'}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Sueldo</label>${s.ingresos || 'No registrado'}</div>
                <div class="col-span-full bg-slate-50 p-3 rounded-xl"><label class="label-field">Motivo del Crédito</label>${s.inversion || 'N/A'}</div>
                <div class="bg-sky-50 p-3 rounded-xl border border-sky-100"><label class="label-field">Monto Solicitado</label>$${s.monto}</div>
                <div class="bg-sky-50 p-3 rounded-xl border border-sky-100"><label class="label-field">Frecuencia</label>${s.frecuencia}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Referencia</label>${s.refNom || s.refNombre || 'N/A'}</div>
                <div class="bg-slate-50 p-3 rounded-xl"><label class="label-field">Tel. Referencia</label>${s.refTel || 'N/A'}</div>
            `;
            document.getElementById('modalS').style.display = "block";
        }

        async function aprobarCredito() {
            const snap = await db.ref('clientes/' + currentId).once('value');
            const s = snap.val();
            const monto = parseFloat(s.monto);
            const total = monto + (monto * 0.20);
            const numCuotas = s.frecuencia === 'diario' ? 30 : 4;
            const valorCuota = (total / numCuotas).toFixed(2);

            let cuotas = [];
            for (let i = 1; i <= numCuotas; i++) {
                cuotas.push({ n: i, valorPagado: parseFloat(valorCuota), pagada: false, fecha: "" });
            }

            await db.ref('clientes/' + currentId).update({
                tipo: "ACTIVO",
                total: total,
                saldo: total,
                fechaInicio: new Date().toLocaleDateString(),
                cuotas: cuotas,
                pass: s.pass || "1234"
            });
            alert("✅ CRÉDITO APROBADO");
            cerrarM();
        }

        async function guardarNuevoManual() {
            const id = Date.now();
            const data = {
                id: id,
                nombre: document.getElementById('m_nombre').value.toUpperCase(),
                dui: document.getElementById('m_dui').value,
                tel: document.getElementById('m_tel').value,
                pass: document.getElementById('m_pass').value,
                dirCasa: document.getElementById('m_dirCasa').value,
                negocio: document.getElementById('m_negocio').value,
                dirNeg: document.getElementById('m_dirNeg').value,
                monto: document.getElementById('m_monto').value,
                frecuencia: document.getElementById('m_frecuencia').value,
                ingresos: document.getElementById('m_ingresos').value,
                inversion: document.getElementById('m_inversion').value,
                refNom: document.getElementById('m_refNom').value,
                refTel: document.getElementById('m_refTel').value,
                tipo: "PENDIENTE",
                fecha: new Date().toLocaleDateString()
            };
            await db.ref('clientes/' + id).set(data);
            alert("✅ Solicitud guardada en Pendientes.");
            document.getElementById('form-manual').open = false;
        }

        function cerrarM() { document.getElementById('modalS').style.display = "none"; }
        async function eliminarS() { if(confirm("¿Eliminar solicitud?")) { await db.ref('clientes/' + currentId).remove(); cerrarM(); } }
    </script>
</body>
</html>
