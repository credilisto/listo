<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrediListo Admin | Santiago de María</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .input-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 0.8rem; border-radius: 1rem; color: white; outline: none; font-size: 0.85rem; }
        .input-admin:focus { border-color: var(--cyan); }
        .label-admin { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 0.2rem; display: block; margin-left: 0.5rem; }
        #admin-content { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="lock-screen" class="fixed inset-0 bg-[#050b16] z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 mb-6">Acceso Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Ingresa tu clave" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-center text-xl tracking-[0.5em] outline-none mb-4" value="">
            <button onclick="verificarAcceso()" class="w-full py-4 bg-white text-black font-black uppercase rounded-2xl">Entrar</button>
        </div>
    </div>

    <div id="admin-content">
        <nav class="p-6 border-b border-white/5 sticky top-0 bg-[#050b16]/90 backdrop-blur-md z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <p class="font-black italic text-cyan-400 uppercase tracking-tighter text-xl">CrediListo Admin</p>
                <button onclick="location.href='detalles.html'" class="bg-cyan-500/10 text-cyan-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Gestión de Pagos →</button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 mt-8">
            
            <section class="mb-10">
                <details id="form-manual" class="bg-white/5 rounded-[30px] border border-white/10 overflow-hidden shadow-2xl">
                    <summary class="p-6 cursor-pointer font-black uppercase italic text-cyan-400 list-none flex justify-between">
                        <span>+ NUEVO REGISTRO MANUAL</span><span>▼</span>
                    </summary>
                    <div class="p-6 border-t border-white/5 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Nombre del Cliente</label><input type="text" id="m_nombre" class="input-admin"></div>
                            <div><label class="label-admin">DUI</label><input type="text" id="m_dui" class="input-admin"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Teléfono</label><input type="tel" id="m_tel" class="input-admin"></div>
                            <div><label class="label-admin">Contraseña App Cliente</label><input type="password" id="m_pass" class="input-admin"></div>
                        </div>
                        <div><label class="label-admin">Dirección de Casa</label><input type="text" id="m_dirCasa" class="input-admin"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Nombre del Negocio</label><input type="text" id="m_negocio" class="input-admin"></div>
                            <div><label class="label-admin">Dirección del Negocio</label><input type="text" id="m_dirNeg" class="input-admin"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label class="label-admin">Monto solicitado ($)</label><input type="number" id="m_monto" class="input-admin"></div>
                            <div>
                                <label class="label-admin">Frecuencia</label>
                                <select id="m_frecuencia" class="input-admin bg-[#050b16]">
                                    <option value="diario">Diario</option>
                                    <option value="semanal">Semanal</option>
                                </select>
                            </div>
                            <div><label class="label-admin">Ingresos Mensuales</label><input type="text" id="m_ingresos" class="input-admin"></div>
                        </div>
                        <div><label class="label-admin">Propósito de Inversión</label><input type="text" id="m_inversion" class="input-admin"></div>
                        <div class="grid grid-cols-2 gap-4 p-4 bg-white/5 rounded-2xl">
                            <div><label class="label-admin text-cyan-400">Referencia Nombre</label><input type="text" id="m_refNom" class="input-admin"></div>
                            <div><label class="label-admin text-cyan-400">Referencia Tel</label><input type="tel" id="m_refTel" class="input-admin"></div>
                        </div>
                        <button onclick="guardarNuevoManual()" class="w-full py-5 bg-white text-black font-black uppercase rounded-2xl shadow-xl shadow-cyan-500/10 active:scale-95 transition-all">Guardar en Base de Datos</button>
                    </div>
                </details>
            </section>

            <section class="space-y-4">
                <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 px-4">Solicitudes Pendientes</h2>
                <div id="lista-solicitudes" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="modalS" class="fixed inset-0 bg-black/95 z-[300] hidden items-center justify-center p-4">
        <div class="bg-[#0b1221] w-full max-w-xl rounded-[40px] p-8 border border-white/10 overflow-y-auto max-h-[90vh]">
            <div id="modal-body"></div>
            <div class="grid grid-cols-2 gap-2 mt-8">
                <button onclick="cerrarM()" class="col-span-2 py-2 text-slate-500 font-black text-[10px] uppercase">Cerrar</button>
                <button onclick="aprobarCredito()" class="bg-green-500 text-black font-black p-4 rounded-xl text-[10px] uppercase">Aprobar Crédito</button>
                <button onclick="eliminarS()" class="bg-red-600 text-white font-black p-4 rounded-xl text-[10px] uppercase">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", projectId: "credilistosv" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        function verificarAcceso() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "lazaroemanuel") {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
                conectarFirebase();
            } else { 
                alert("Acceso Denegado");
                document.getElementById('admin-pass').value = ""; // Limpiar tras error
            }
        }

        function conectarFirebase() {
            db.ref('clientes').on('value', (snap) => {
                const container = document.getElementById('lista-solicitudes');
                container.innerHTML = "";
                snap.forEach((child) => {
                    const s = child.val();
                    if (s.tipo === "PENDIENTE") {
                        container.innerHTML += `
                            <div onclick="abrirS('${child.key}')" class="bg-white/5 p-6 rounded-[30px] border border-white/5 flex justify-between items-center cursor-pointer hover:border-cyan-500/50 transition-all">
                                <div>
                                    <h3 class="font-black uppercase text-lg leading-tight text-white">${s.nombre}</h3>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">DUI: ${s.dui} | $${s.monto} (${s.frecuencia})</p>
                                </div>
                                <span class="text-cyan-500 font-black italic">DETALLES</span>
                            </div>`;
                    }
                });
            });
        }

        async function abrirS(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();
            document.getElementById('modal-body').innerHTML = `
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-black text-white uppercase italic leading-none">${s.nombre}</h2>
                    <span class="bg-cyan-500/20 text-cyan-400 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest mt-2 inline-block">${s.frecuencia}</span>
                </div>
                <div class="space-y-3 text-[10px] uppercase font-bold">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">DUI</p>${s.dui}</div>
                        <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">TEL</p>${s.tel}</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">DIR. CASA</p>${s.dirCasa || s.dirVivienda}</div>
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">NEGOCIO</p>${s.negocio} - ${s.dirNeg || s.dirNegocio}</div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/5 p-3 rounded-xl text-cyan-400 border border-cyan-500/20"><p class="text-slate-500 text-[8px] mb-1">MONTO SOLICITADO</p>$${s.monto}</div>
                        <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">INGRESOS MENS.</p>$${s.ingresos || '0'}</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-slate-500 text-[8px] mb-1">INVERSIÓN</p><span class="italic text-cyan-100">"${s.inversion || 'N/A'}"</span></div>
                    <div class="bg-white/5 p-3 rounded-xl border border-white/5"><p class="text-slate-500 text-[8px] mb-1">REFERENCIA</p>${s.refNom || 'N/A'} (${s.refTel || ''})</div>
                </div>`;
            document.getElementById('modalS').style.display = "flex";
        }

        async function aprobarCredito() {
            if(!currentId) return;
            const clave = prompt("Para aprobar, confirma con tu clave:");
            if (clave !== "lazaroemanuel") return alert("Clave incorrecta");

            const snap = await db.ref('clientes/' + currentId).once('value');
            const s = snap.val();
            const monto = parseFloat(s.monto);
            const total = monto + (monto * 0.20);
            const numCuotas = s.frecuencia === 'diario' ? 30 : 4;
            const valorCuota = (total / numCuotas).toFixed(2);

            let cuotas = [];
            for (let i = 1; i <= numCuotas; i++) {
                cuotas.push({ n: i, valorPagado: valorCuota, pagada: false, fecha: "" });
            }

            await db.ref('clientes/' + currentId).update({
                tipo: "ACTIVO",
                total: total,
                saldo: total,
                fechaInicio: new Date().toLocaleDateString(),
                cuotas: cuotas,
                pass: s.pass || "1234"
            });

            alert("Crédito aprobado con éxito");
            cerrarM();
        }

        async function guardarNuevoManual() {
            const id = Date.now();
            const data = {
                id: id,
                nombre: document.getElementById('m_nombre').value.toUpperCase(),
                dui: document.getElementById('m_dui').value,
                tel: document.getElementById('m_tel').value,
                pass: document.getElementById('m_pass').value,
                dirCasa: document.getElementById('m_dirCasa').value,
                negocio: document.getElementById('m_negocio').value,
                dirNeg: document.getElementById('m_dirNeg').value,
                monto: document.getElementById('m_monto').value,
                frecuencia: document.getElementById('m_frecuencia').value,
                ingresos: document.getElementById('m_ingresos').value,
                inversion: document.getElementById('m_inversion').value,
                refNom: document.getElementById('m_refNom').value,
                refTel: document.getElementById('m_refTel').value,
                tipo: "PENDIENTE",
                fecha: new Date().toLocaleDateString()
            };
            await db.ref('clientes/' + id).set(data);
            alert("✅ Cliente guardado como PENDIENTE");
            document.getElementById('form-manual').open = false;
        }

        async function eliminarS() {
            if(confirm("¿Eliminar definitivamente?")) {
                await db.ref('clientes/' + currentId).remove();
                cerrarM();
            }
        }
        function cerrarM() { document.getElementById('modalS').style.display = "none"; }
    </script>
</body>
</html>
