<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel CrediListo | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .input-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 0.8rem; border-radius: 1rem; color: white; outline: none; }
        #admin-content { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="lock-screen" class="fixed inset-0 bg-[#050b16] z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 mb-6">Contraseña Administrativa</h2>
            <input type="password" id="admin-pass" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-center text-xl tracking-[0.5em] outline-none mb-4">
            <button onclick="verificarAcceso()" class="w-full py-4 bg-white text-black font-black uppercase rounded-2xl">Entrar</button>
        </div>
    </div>

    <div id="admin-content">
        <nav class="p-6 border-b border-white/5 sticky top-0 bg-[#050b16]/90 backdrop-blur-md z-50">
             <div class="flex justify-between items-center max-w-5xl mx-auto">
                <p class="font-black italic text-cyan-400 uppercase">CrediListo Admin</p>
                <div class="text-[9px] uppercase font-black text-green-500">Base de Datos Conectada</div>
             </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 mt-8">
            <section>
                <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 mb-6 px-4">Solicitudes Pendientes</h2>
                <div id="lista-solicitudes" class="space-y-4">
                    <p class="text-center text-slate-700 py-10 animate-pulse font-black uppercase text-[10px]">Sincronizando con Firebase...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modalS" class="fixed inset-0 bg-black/95 z-[300] hidden items-center justify-center p-4">
        <div class="bg-[#0b1221] w-full max-w-xl rounded-[40px] p-8 border border-white/10">
            <div id="modal-body"></div>
            <div class="grid grid-cols-2 gap-2 mt-8">
                <button onclick="cerrarM()" class="col-span-2 py-2 text-slate-500 font-black text-[10px] uppercase">Cerrar</button>
                <button class="bg-green-500 text-black font-black p-4 rounded-xl text-[10px] uppercase">Aprobar</button>
                <button onclick="eliminarS()" class="bg-red-600 text-white font-black p-4 rounded-xl text-[10px] uppercase">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = { 
            databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", 
            projectId: "credilistosv" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        function verificarAcceso() {
            if(document.getElementById('admin-pass').value === "lazaroemanuel") {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
                conectarFirebase();
            } else { alert("PIN incorrecto"); }
        }

        function conectarFirebase() {
            const container = document.getElementById('lista-solicitudes');
            
            // Apuntamos directamente a la carpeta 'clientes'
            db.ref('clientes').on('value', (snapshot) => {
                container.innerHTML = "";
                
                if (!snapshot.exists()) {
                    container.innerHTML = "<p class='text-center text-slate-800 font-black py-10'>NO HAY DATOS EN LA CARPETA CLIENTES</p>";
                    return;
                }

                snapshot.forEach((childSnapshot) => {
                    const s = childSnapshot.val();
                    const id = childSnapshot.key;

                    // Filtramos por el campo 'tipo' que vimos en tu JSON
                    if (s.tipo === "PENDIENTE") {
                        container.innerHTML += `
                            <div onclick="abrirS('${id}')" class="bg-white/5 p-6 rounded-[30px] border border-white/5 hover:border-cyan-500/50 transition-all cursor-pointer flex justify-between items-center shadow-xl">
                                <div>
                                    <p class="text-[9px] font-black text-cyan-400 uppercase italic mb-1">${s.negocio || 'Sin Negocio'}</p>
                                    <h3 class="font-black uppercase text-lg leading-tight">${s.nombre}</h3>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">DUI: ${s.dui} | Monto: $${s.monto}</p>
                                </div>
                                <div class="bg-cyan-500/10 p-3 rounded-2xl text-cyan-500 font-black italic">VER</div>
                            </div>`;
                    }
                });

                if (container.innerHTML === "") {
                    container.innerHTML = "<p class='text-center text-slate-700 py-10'>No hay solicitudes pendientes actuales.</p>";
                }
            });
        }

        async function abrirS(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();
            
            document.getElementById('modal-body').innerHTML = `
                <div class="text-center mb-6">
                    <p class="text-[10px] text-cyan-500 font-black uppercase tracking-widest italic">Detalles de Solicitud</p>
                    <h2 class="text-2xl font-black text-white uppercase italic">${s.nombre}</h2>
                </div>
                <div class="space-y-4 text-[11px] uppercase font-bold text-slate-300">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-3 rounded-2xl"><p class="text-slate-500 text-[9px] mb-1">DUI</p>${s.dui}</div>
                        <div class="bg-white/5 p-3 rounded-2xl"><p class="text-slate-500 text-[9px] mb-1">TELÉFONO</p>${s.tel}</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl"><p class="text-slate-500 text-[9px] mb-1">DIRECCIÓN CASA</p>${s.dirCasa || s.dirVivienda}</div>
                    <div class="bg-white/5 p-3 rounded-2xl"><p class="text-slate-500 text-[9px] mb-1">NEGOCIO</p>${s.negocio} (${s.dirNeg || s.dirNegocio})</div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-3 rounded-2xl border border-cyan-500/20"><p class="text-cyan-500 text-[9px] mb-1">MONTO</p>$${s.monto}</div>
                        <div class="bg-white/5 p-3 rounded-2xl"><p class="text-slate-500 text-[9px] mb-1">PAGO</p>${s.frecuencia}</div>
                    </div>
                </div>`;
            document.getElementById('modalS').style.display = "flex";
        }

        async function eliminarS() {
            if(confirm("¿Eliminar definitivamente esta solicitud?")) {
                await db.ref('clientes/' + currentId).remove();
                cerrarM();
            }
        }

        function cerrarM() { document.getElementById('modalS').style.display = "none"; }
    </script>
</body>
</html>
