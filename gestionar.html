<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; --green: #3aef9b; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .card-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 2rem; text-align: center; }
        .input-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 0.8rem; border-radius: 1rem; color: white; outline: none; font-size: 0.9rem; }
        .input-admin:focus { border-color: var(--cyan); }
        .label-admin { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-left: 0.5rem; margin-bottom: 0.2rem; display: block; }
        #admin-content { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="lock-screen" class="fixed inset-0 bg-[#050b16] z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <img src="logocredi.png" class="h-10 mx-auto mb-8 opacity-80" style="mix-blend-mode: lighten;">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 mb-6">Acceso Restringido</h2>
            <input type="password" id="admin-pass" placeholder="PIN DE SEGURIDAD" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-center text-xl tracking-[0.5em] outline-none mb-4">
            <button onclick="verificarAcceso()" class="w-full py-4 bg-white text-black font-black uppercase rounded-2xl active:scale-95 transition-all">Ingresar</button>
        </div>
    </div>

    <div id="admin-content">
        <nav class="p-6 border-b border-white/5 sticky top-0 bg-[#050b16]/90 backdrop-blur-md z-50">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-slate-500">Dinero en Calle</p>
                    <p id="total-calle" class="text-xl font-black italic">$0.00</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-slate-500">Ganancia</p>
                    <p id="total-ganancia" class="text-xl font-black italic text-green-400">$0.00</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-slate-500">Cobrado Hoy</p>
                    <p id="total-hoy" class="text-xl font-black italic text-cyan-400">$0.00</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-slate-500">En Deuda</p>
                    <p id="total-deuda" class="text-xl font-black italic text-red-400">$0.00</p>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 mt-8">
            
            <section class="mb-10">
                <details class="bg-white/5 rounded-[30px] border border-white/10 overflow-hidden shadow-2xl">
                    <summary class="p-6 cursor-pointer font-black uppercase italic text-cyan-400 list-none flex justify-between items-center">
                        <span>+ AGREGAR CLIENTE MANUAL</span>
                        <span class="text-[10px] bg-cyan-500/10 px-3 py-1 rounded-full">DESPLEGAR</span>
                    </summary>
                    <div class="p-6 border-t border-white/5 space-y-6 bg-white/[0.01]">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Nombre Completo</label><input type="text" id="m_nombre" class="input-admin"></div>
                            <div><label class="label-admin">DUI</label><input type="text" id="m_dui" class="input-admin"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Teléfono / WhatsApp</label><input type="tel" id="m_tel" class="input-admin"></div>
                            <div><label class="label-admin">Contraseña para Cliente</label><input type="password" id="m_pass_cliente" class="input-admin"></div>
                        </div>
                        <div><label class="label-admin">Dirección de Casa</label><input type="text" id="m_casa" class="input-admin"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="label-admin">Negocio o Rubro</label><input type="text" id="m_rubro" class="input-admin"></div>
                            <div><label class="label-admin">Propósito del Crédito</label><input type="text" id="m_proposito" class="input-admin"></div>
                        </div>
                        <div><label class="label-admin">Dirección del Negocio</label><input type="text" id="m_dir_neg" class="input-admin"></div>
                        
                        <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                            <div><label class="label-admin text-cyan-400">Referencia Nombre</label><input type="text" id="m_ref_nom" class="input-admin"></div>
                            <div><label class="label-admin text-cyan-400">Referencia Tel</label><input type="tel" id="m_ref_tel" class="input-admin"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="label-admin">Foto Contrato</label><input type="file" class="input-admin text-[10px]"></div>
                            <div><label class="label-admin">Letra de Cambio</label><input type="file" class="input-admin text-[10px]"></div>
                        </div>
                        <button onclick="guardarClienteManual()" class="w-full py-5 bg-white text-black font-black uppercase tracking-widest rounded-2xl active:scale-95 transition-all shadow-xl shadow-cyan-500/10">Guardar Nuevo Cliente</button>
                    </div>
                </details>
            </section>

            <section class="space-y-4">
                <div class="flex justify-between items-center px-4">
                    <h2 class="text-xs font-black uppercase tracking-[0.4em] text-slate-500">Solicitudes Entrantes</h2>
                    <button onclick="location.href='detalles.html'" class="text-[10px] font-black uppercase text-cyan-400">Ver Detalles de Pagos →</button>
                </div>
                <div id="lista-solicitudes" class="space-y-3">
                    <p class="text-center text-slate-700 italic py-10 font-black uppercase text-[10px]">Esperando datos de Firebase...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modalS" class="fixed inset-0 bg-black/95 z-[300] hidden items-center justify-center p-4">
        <div class="bg-[#0b1221] w-full max-w-xl rounded-[40px] p-8 border border-white/10 overflow-y-auto max-h-[90vh]">
            <div id="modal-body"></div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-8">
                <button onclick="cerrarModal()" class="col-span-2 md:col-span-4 py-2 text-slate-500 font-black text-[10px] uppercase mb-4">Cerrar Ventana</button>
                <button class="bg-green-500 text-black font-black p-4 rounded-xl text-[10px] uppercase">Aprobar</button>
                <button class="bg-orange-500 text-black font-black p-4 rounded-xl text-[10px] uppercase">Observar</button>
                <button class="bg-red-600 text-white font-black p-4 rounded-xl text-[10px] uppercase">Rechazar</button>
                <button class="bg-slate-800 text-red-500 font-black p-4 rounded-xl text-[10px] uppercase">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN REALTIME DATABASE
        const firebaseConfig = {
            databaseURL: "https://credilistosv-default-rtdb.firebaseio.com",
            projectId: "credilistosv"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // SEGURIDAD
        function verificarAcceso() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "lazaroemanuel") {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
                cargarTotales();
            } else {
                alert("Acceso Denegado");
            }
        }

        // LECTURA DE DATOS
        db.ref('solicitudes').on('value', (snapshot) => {
            const container = document.getElementById('lista-solicitudes');
            container.innerHTML = "";
            if (!snapshot.exists()) {
                container.innerHTML = "<p class='text-center text-slate-800 font-black uppercase text-[10px] py-10'>No hay nuevas solicitudes</p>";
                return;
            }
            snapshot.forEach((child) => {
                const id = child.key;
                const s = child.val();
                container.innerHTML += `
                    <div onclick="abrirSolicitud('${id}')" class="bg-white/5 p-6 rounded-[25px] border border-white/5 hover:border-cyan-500/50 transition-all cursor-pointer flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest italic mb-1">${s.rubro || 'Rubro'}</p>
                            <h3 class="font-black italic uppercase text-lg">${s.nombre}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">DUI: ${s.dui} | Tel: ${s.telefono}</p>
                        </div>
                        <span class="text-cyan-500 text-2xl">→</span>
                    </div>`;
            });
        });

        async function abrirSolicitud(id) {
            const snap = await db.ref('solicitudes/' + id).once('value');
            const s = snap.val();
            document.getElementById('modal-body').innerHTML = `
                <h2 class="text-2xl font-black italic uppercase text-cyan-400 text-center mb-6">${s.nombre}</h2>
                <div class="grid grid-cols-2 gap-4 text-xs border-t border-white/5 pt-6">
                    <div><p class="label-admin">DUI</p><p class="font-black">${s.dui}</p></div>
                    <div><p class="label-admin">Teléfono</p><p class="font-black">${s.telefono}</p></div>
                    <div class="col-span-2"><p class="label-admin">Dirección Casa</p><p class="font-black text-[11px]">${s.direccion_casa}</p></div>
                    <div><p class="label-admin">Negocio</p><p class="font-black">${s.rubro}</p></div>
                    <div><p class="label-admin">Propósito</p><p class="font-black italic text-cyan-400">${s.proposito}</p></div>
                    <div class="col-span-2"><p class="label-admin">Dirección Negocio</p><p class="font-black text-[11px]">${s.direccion_negocio}</p></div>
                    <div class="col-span-2 bg-white/5 p-4 rounded-2xl border border-white/10">
                        <p class="label-admin text-cyan-400">Referencia Familiar</p>
                        <p class="font-black uppercase">${s.referencia?.nombre || 'N/A'} — ${s.referencia?.tel || ''}</p>
                    </div>
                </div>`;
            document.getElementById('modalS').style.display = "flex";
        }

        function cerrarModal() { document.getElementById('modalS').style.display = "none"; }

        function cargarTotales() {
            // Lógica para calcular sumatorias desde db.ref('clientes')
            document.getElementById('total-calle').innerText = "$0.00"; 
        }
    </script>
</body>
</html>
