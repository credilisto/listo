<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Caja Chica | CrediListo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg:         #f0f4f8;
            --surface:    #ffffff;
            --surface2:   #f1f5f9;
            --border:     #e2e8f0;
            --border2:    #cbd5e1;
            --text:       #0f172a;
            --muted:      #94a3b8;
            --muted2:     #64748b;
            --accent:     #0ea5e9;
            --green:      #16a34a;
            --green-dim:  rgba(22,163,74,0.1);
            --danger:     #ef4444;
            --danger-dim: rgba(239,68,68,0.08);
            --warn:       #f59e0b;
            --inver1:     #0ea5e9;
            --inver1-dim: rgba(14,165,233,0.1);
            --inver2:     #8b5cf6;
            --inver2-dim: rgba(139,92,246,0.1);
            --safe-b:     env(safe-area-inset-bottom, 0px);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Instrument Sans', sans-serif; }

        /* ── LOCK ── */
        #lock {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem;
        }
        .lock-logo { font-family: 'Syne', sans-serif; font-size: 2.2rem; color: #fff; }
        .lock-logo span { color: rgba(255,255,255,0.5); }
        .lock-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
                    border: 1px solid rgba(255,255,255,0.3); border-radius: 1.5rem;
                    padding: 2rem 1.5rem; width: min(90vw, 320px); text-align: center; }
        .lock-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
                      color: rgba(255,255,255,0.8); margin-bottom: 1rem; display: block; }
        .lock-input { width: 100%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35);
                      border-radius: 0.75rem; padding: 0.9rem 1rem; font-size: 1.4rem; letter-spacing: 0.3em;
                      color: white; text-align: center; outline: none; font-family: 'JetBrains Mono', monospace; }
        .lock-input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
        .lock-btn { margin-top: 1rem; width: 100%; background: white; color: #0284c7;
                    border: none; border-radius: 0.75rem; padding: 0.9rem; font-size: 0.85rem;
                    font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
        .lock-err { color: #fef08a; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
                    text-transform: uppercase; margin-top: 0.75rem; display: none; }

        /* ── APP ── */
        #app { display: none; min-height: 100vh; }

        /* Header */
        .hdr { background: white; border-bottom: 1px solid var(--border);
               padding: 1rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 100; }
        .hdr-top { display: flex; align-items: center; justify-content: space-between; }
        .hdr-logo { font-family: 'Syne', sans-serif; font-size: 1.25rem; color: var(--text); }
        .hdr-logo span { color: var(--muted); }
        .hdr-sub { font-size: 0.65rem; color: var(--muted2); font-weight: 600;
                   letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.15rem; }

        /* Cuenta selector */
        .cuenta-tabs { display: flex; gap: 0.5rem; padding: 1rem 1.25rem 0; }
        .tab { flex: 1; padding: 0.75rem; border-radius: 0.75rem; border: 2px solid var(--border);
               background: var(--surface2); font-size: 0.8rem; font-weight: 700; cursor: pointer;
               text-align: center; transition: all 0.18s; color: var(--muted2); }
        .tab.active-1 { background: var(--inver1-dim); border-color: var(--inver1); color: var(--inver1); }
        .tab.active-2 { background: var(--inver2-dim); border-color: var(--inver2); color: var(--inver2); }

        /* Saldo card */
        .saldo-card { margin: 1rem 1.25rem 0; border-radius: 1.25rem; padding: 1.25rem 1.5rem;
                      background: var(--surface); border: 1px solid var(--border); }
        .saldo-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em;
                       text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
        .saldo-valor { font-family: 'JetBrains Mono', monospace; font-size: 2.4rem;
                       font-weight: 700; line-height: 1; }
        .saldo-valor.c1 { color: var(--inver1); }
        .saldo-valor.c2 { color: var(--inver2); }
        .saldo-sub { font-size: 0.68rem; color: var(--muted2); margin-top: 0.3rem; }

        /* Modo tabs */
        .modo-tabs { display: flex; margin: 1rem 1.25rem 0; background: var(--surface2);
                     border-radius: 0.75rem; padding: 0.25rem; gap: 0.2rem; border: 1px solid var(--border); }
        .modo-tab { flex: 1; padding: 0.6rem; border-radius: 0.5rem; font-size: 0.72rem; font-weight: 700;
                    text-align: center; cursor: pointer; color: var(--muted2); transition: all 0.15s; }
        .modo-tab.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

        /* Forms */
        .form-card { margin: 1rem 1.25rem 0; background: var(--surface); border: 1px solid var(--border);
                     border-radius: 1.25rem; padding: 1.25rem; }
        .form-title { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em;
                      text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
        .field { margin-bottom: 0.85rem; }
        .field label { display: block; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
                       text-transform: uppercase; color: var(--muted2); margin-bottom: 0.35rem; }
        .field input, .field textarea, .field select {
            width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
            border-radius: 0.75rem; padding: 0.8rem 1rem; font-size: 0.95rem;
            font-family: 'Instrument Sans', sans-serif; color: var(--text); outline: none;
            transition: border-color 0.15s; -webkit-appearance: none; }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .field input[type="number"] { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; }
        .field textarea { resize: none; height: 70px; }

        /* Botones acción */
        .btn-accion { width: 100%; padding: 1rem; border: none; border-radius: 0.85rem;
                      font-size: 0.9rem; font-weight: 800; letter-spacing: 0.05em;
                      cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; }
        .btn-inyectar { background: var(--green); color: white; }
        .btn-inyectar:active { opacity: 0.85; transform: scale(0.98); }
        .btn-gasto { background: var(--danger); color: white; }
        .btn-gasto:active { opacity: 0.85; transform: scale(0.98); }

        /* Historial */
        .historial { margin: 1rem 1.25rem calc(1.5rem + var(--safe-b)); }
        .hist-title { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.18em;
                      text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; padding: 0 0.25rem; }
        .hist-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .hist-item { background: var(--surface); border: 1px solid var(--border);
                     border-radius: 0.85rem; padding: 0.85rem 1rem;
                     display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .hist-info { flex: 1; min-width: 0; }
        .hist-motivo { font-size: 0.85rem; font-weight: 600; color: var(--text);
                       white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-fecha { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }
        .hist-tipo { font-size: 0.55rem; font-weight: 800; letter-spacing: 0.1em;
                     text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 2rem; margin-bottom: 0.2rem; display: inline-block; }
        .hist-tipo.entrada { background: var(--green-dim); color: var(--green); }
        .hist-tipo.gasto { background: var(--danger-dim); color: var(--danger); }
        .hist-monto { font-family: 'JetBrains Mono', monospace; font-size: 1rem;
                      font-weight: 700; white-space: nowrap; }
        .hist-monto.entrada { color: var(--green); }
        .hist-monto.gasto { color: var(--danger); }
        .hist-vacio { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; }

        /* Toast */
        #toast { position: fixed; bottom: calc(1.5rem + var(--safe-b)); left: 50%; transform: translateX(-50%) translateY(100px);
                 background: #1e293b; color: white; padding: 0.7rem 1.5rem; border-radius: 2rem;
                 font-size: 0.8rem; font-weight: 600; z-index: 9000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
                 white-space: nowrap; pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.error { background: var(--danger); }

        .loading-row { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
    <div class="lock-logo">Credi<span>Listo</span></div>
    <div class="lock-box">
        <span class="lock-label">PIN de acceso</span>
        <input type="password" id="pin-input" inputmode="numeric" placeholder="••••" maxlength="6"
               class="lock-input" onkeydown="if(event.key==='Enter')verificar()">
        <button class="lock-btn" onclick="verificar()">Entrar</button>
        <div class="lock-err" id="pin-err">PIN incorrecto</div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="hdr">
        <div class="hdr-top">
            <div>
                <div class="hdr-logo">Credi<span>Listo</span></div>
                <div class="hdr-sub">💰 Caja Chica</div>
            </div>
        </div>
    </div>

    <!-- Selector de cuenta -->
    <div class="cuenta-tabs">
        <div class="tab active-1" id="tab-1" onclick="seleccionarCuenta(1)">📘 Inver 1</div>
        <div class="tab" id="tab-2" onclick="seleccionarCuenta(2)">📙 Inver 2</div>
    </div>

    <!-- Saldo actual -->
    <div class="saldo-card">
        <div class="saldo-label">Caja Chica disponible</div>
        <div class="saldo-valor c1" id="saldo-display">$0.00</div>
        <div class="saldo-sub" id="cuenta-label">Inversión 1</div>
    </div>

    <!-- Modo: Inyectar / Gasto -->
    <div class="modo-tabs">
        <div class="modo-tab active" id="modo-inj" onclick="setModo('inyectar')">➕ Ingresar saldo</div>
        <div class="modo-tab" id="modo-gas" onclick="setModo('gasto')">➖ Registrar gasto</div>
    </div>

    <!-- Formulario Inyectar -->
    <div class="form-card" id="form-inyectar">
        <div class="form-title">➕ Ingresar saldo a caja chica</div>
        <div class="field">
            <label>Monto ($)</label>
            <input type="number" id="inj-monto" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
            <label>Motivo / Descripción</label>
            <textarea id="inj-motivo" placeholder="Ej: Cobro semanal, depósito…"></textarea>
        </div>
        <button class="btn-accion btn-inyectar" onclick="registrarIngreso()">✓ Confirmar ingreso</button>
    </div>

    <!-- Formulario Gasto -->
    <div class="form-card" id="form-gasto" style="display:none">
        <div class="form-title">➖ Registrar gasto de caja chica</div>
        <div class="field">
            <label>Monto a descontar ($)</label>
            <input type="number" id="gas-monto" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
            <label>Motivo del gasto</label>
            <textarea id="gas-motivo" placeholder="Ej: Gasolina, papelería…"></textarea>
        </div>
        <button class="btn-accion btn-gasto" onclick="registrarGasto()">− Confirmar gasto</button>
    </div>

    <!-- Historial -->
    <div class="historial">
        <div class="hist-title">Últimos movimientos</div>
        <div class="hist-list" id="hist-list">
            <div class="loading-row">Cargando…</div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const PIN    = "2025";
    const DB_URL = "https://credilistosv-default-rtdb.firebaseio.com";
    const FB_CFG = {
        apiKey:        "AIzaSyC1GiJitT0QegrVe9o6CHCsvf7sEZELwRk",
        authDomain:    "credilistosv.firebaseapp.com",
        databaseURL:   DB_URL,
        projectId:     "credilistosv",
        storageBucket: "credilistosv.firebasestorage.app"
    };

    let db, cuentaActual = 1, cajaActual = 0;
    let unsubCaja = null, unsubHist = null;

    // Rutas según cuenta
    function cfg()  { return cuentaActual === 1 ? 'config/finanzas'  : 'config/finanzas2'; }
    function hist() { return cuentaActual === 1 ? 'movimientos_caja' : 'movimientos_caja2'; }

    function fmt(v) {
        return '$' + parseFloat(v||0).toLocaleString('es-SV', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function verificar() {
        const val = document.getElementById('pin-input').value;
        if (val === PIN) {
            document.getElementById('lock').style.display = 'none';
            document.getElementById('app').style.display  = 'block';
            iniciar();
        } else {
            document.getElementById('pin-err').style.display = 'block';
            document.getElementById('pin-input').value = '';
        }
    }

    function iniciar() {
        if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
        db = firebase.database();
        escucharCuenta();
    }

    function seleccionarCuenta(n) {
        cuentaActual = n;
        document.getElementById('tab-1').className = 'tab' + (n===1 ? ' active-1' : '');
        document.getElementById('tab-2').className = 'tab' + (n===2 ? ' active-2' : '');
        const disp = document.getElementById('saldo-display');
        disp.className = 'saldo-valor ' + (n===1 ? 'c1' : 'c2');
        document.getElementById('cuenta-label').textContent = n===1 ? 'Inversión 1' : 'Inversión 2';
        escucharCuenta();
    }

    function escucharCuenta() {
        // Desuscribir listeners anteriores
        if (unsubCaja) { unsubCaja(); unsubCaja = null; }
        if (unsubHist) { unsubHist(); unsubHist = null; }

        document.getElementById('saldo-display').textContent = '...';
        document.getElementById('hist-list').innerHTML = '<div class="loading-row">Cargando…</div>';

        const refCaja = db.ref(cfg());
        const onCaja = refCaja.on('value', snap => {
            const data = snap.val() || {};
            cajaActual = parseFloat(data.cajaChica || 0);
            document.getElementById('saldo-display').textContent = fmt(cajaActual);
        });
        unsubCaja = () => refCaja.off('value', onCaja);

        const refHist = db.ref(hist()).orderByChild('fecha').limitToLast(25);
        const onHist = refHist.on('value', snap => {
            const items = [];
            snap.forEach(h => items.unshift({ key: h.key, ...h.val() }));
            renderHistorial(items);
        });
        unsubHist = () => refHist.off('value', onHist);
    }

    function renderHistorial(items) {
        const el = document.getElementById('hist-list');
        if (!items.length) {
            el.innerHTML = '<div class="hist-vacio">Sin movimientos registrados</div>';
            return;
        }
        el.innerHTML = items.map(m => {
            const esGasto = m.tipo === 'gasto';
            return `<div class="hist-item">
                <div class="hist-info">
                    <span class="hist-tipo ${esGasto ? 'gasto' : 'entrada'}">${esGasto ? 'Gasto' : 'Ingreso'}</span>
                    <div class="hist-motivo">${m.motivo || '—'}</div>
                    <div class="hist-fecha">${m.fechaStr || ''}</div>
                </div>
                <div class="hist-monto ${esGasto ? 'gasto' : 'entrada'}">${esGasto ? '-' : '+'}${fmt(m.monto)}</div>
            </div>`;
        }).join('');
    }

    function setModo(modo) {
        const esInj = modo === 'inyectar';
        document.getElementById('form-inyectar').style.display = esInj ? 'block' : 'none';
        document.getElementById('form-gasto').style.display    = esInj ? 'none'  : 'block';
        document.getElementById('modo-inj').className = 'modo-tab' + (esInj ? ' active' : '');
        document.getElementById('modo-gas').className = 'modo-tab' + (!esInj ? ' active' : '');
    }

    async function registrarIngreso() {
        const monto  = parseFloat(document.getElementById('inj-monto').value);
        const motivo = document.getElementById('inj-motivo').value.trim();
        if (!monto || monto <= 0) { toast('Ingresá un monto válido', true); return; }
        if (!motivo) { toast('Ingresá el motivo', true); return; }
        const nuevaCaja = parseFloat((cajaActual + monto).toFixed(2));
        const fechaStr  = ahoraStr();
        try {
            await db.ref(cfg()).update({ cajaChica: nuevaCaja });
            await db.ref(hist()).push({ tipo: 'ingreso', monto, motivo, fecha: Date.now(), fechaStr });
            document.getElementById('inj-monto').value  = '';
            document.getElementById('inj-motivo').value = '';
            toast('✓ Saldo ingresado correctamente');
        } catch(e) { toast('Error: ' + e.message, true); }
    }

    async function registrarGasto() {
        const monto  = parseFloat(document.getElementById('gas-monto').value);
        const motivo = document.getElementById('gas-motivo').value.trim();
        if (!monto || monto <= 0) { toast('Ingresá un monto válido', true); return; }
        if (!motivo) { toast('Ingresá el motivo del gasto', true); return; }
        if (monto > cajaActual) { toast('Monto supera la caja disponible (' + fmt(cajaActual) + ')', true); return; }
        const nuevaCaja = parseFloat((cajaActual - monto).toFixed(2));
        const fechaStr  = ahoraStr();
        try {
            await db.ref(cfg()).update({ cajaChica: nuevaCaja });
            await db.ref(hist()).push({ tipo: 'gasto', monto, motivo, fecha: Date.now(), fechaStr });
            document.getElementById('gas-monto').value  = '';
            document.getElementById('gas-motivo').value = '';
            toast('Gasto registrado');
        } catch(e) { toast('Error: ' + e.message, true); }
    }

    function ahoraStr() {
        const a = new Date();
        return a.toLocaleDateString('es-SV') + ' ' + a.toLocaleTimeString('es-SV', { hour: '2-digit', minute: '2-digit' });
    }

    let toastTimer;
    function toast(msg, error = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show' + (error ? ' error' : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.className = '', 2800);
    }
</script>
</body>
</html>
