<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecciones | CrediListo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg:#0a0f1e; --surface:#111827; --surface2:#1a2235; --surface3:#1f2d45;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
            --text:#f1f5f9; --muted:#64748b; --muted2:#94a3b8;
            --accent:#38bdf8; --accent-dim:rgba(56,189,248,0.1); --accent-border:rgba(56,189,248,0.25);
            --green:#4ade80; --green-dim:rgba(74,222,128,0.08);
            --amber:#fbbf24; --amber-dim:rgba(251,191,36,0.08);
            --rose:#fb7185; --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.08);
            --orange:#fb923c;
            --lazaro:#38bdf8; --emanuel:#4ade80; --magda:#f472b6; --walter:#fb923c;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh}

        /* LOCK */
        #lock{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0a0f1e 0%,#0f1f3a 50%,#0a0f1e 100%);display:flex;align-items:center;justify-content:center}
        .lock-glow{position:absolute;inset:0;overflow:hidden;pointer-events:none}
        .lock-glow::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(56,189,248,0.12) 0%,transparent 70%);border-radius:50%}
        .lock-card{position:relative;width:min(90vw,360px);text-align:center}
        .lock-icon{width:64px;height:64px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:1.25rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.75rem}
        .lock-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.04em;margin-bottom:.25rem}
        .lock-logo em{color:var(--accent);font-style:normal}
        .lock-sub{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
        .lock-badge{display:inline-block;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);font-size:.55rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2rem;margin-bottom:2rem}
        .lock-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.15);border-radius:.75rem;padding:1rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;text-align:center;letter-spacing:.5em;outline:none;transition:border-color .2s,background .2s;margin-bottom:.75rem}
        .lock-input::placeholder{color:rgba(255,255,255,.2);letter-spacing:.3em;font-size:1.2rem}
        .lock-input:focus{border-color:var(--accent);background:rgba(56,189,248,.05)}
        .lock-btn{width:100%;background:var(--accent);color:#0a0f1e;border:none;border-radius:.75rem;padding:.9rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
        .lock-btn:hover{opacity:.85}
        #lock-err{color:var(--rose);font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:.5rem;display:none}

        /* APP */
        #app{display:none}
        .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;height:56px}
        .header-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:-.03em}
        .header-brand em{color:var(--accent);font-style:normal}
        .header-tag{font-size:.55rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2rem;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}

        .tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:.25rem;overflow-x:auto}
        .tab{padding:.85rem 1.25rem;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
        .tab:hover{color:var(--text)}
        .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.4rem;vertical-align:middle}

        .main{padding:1.5rem;max-width:1200px;margin:0 auto;padding-bottom:5rem}

        /* LOADING */
        .loading-wrap{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--muted);gap:.75rem}
        .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* STATUS */
        .status-bar{background:var(--surface);border-top:1px solid var(--border);padding:.5rem 1.5rem;font-size:.6rem;color:var(--muted);display:flex;justify-content:space-between;position:fixed;bottom:0;left:0;right:0}
        .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:.4rem;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

        /* HERO */
        .page-hero{background:linear-gradient(135deg,var(--surface2) 0%,rgba(56,189,248,.04) 100%);border:1px solid var(--border);border-radius:1.25rem;padding:1.75rem 2rem;margin-bottom:1.5rem}
        .hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:-.03em;margin-bottom:.4rem}
        .hero-title em{color:var(--accent);font-style:normal}
        .hero-sub{font-size:.7rem;color:var(--muted);line-height:1.65}

        /* METHOD BANNER */
        .method-banner{background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.2);border-radius:1rem;padding:1.1rem 1.5rem;margin-bottom:1.5rem;display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:start}
        .method-icon{font-size:1.5rem;padding-top:.1rem}
        .method-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:var(--amber);margin-bottom:.5rem}
        .method-steps{display:flex;flex-wrap:wrap;gap:.5rem}
        .method-step{background:var(--surface2);border:1px solid var(--border2);border-radius:.5rem;padding:.5rem .75rem;font-size:.62rem;color:var(--muted2);line-height:1.45}
        .method-step strong{color:var(--text)}

        /* HORIZON */
        .horizon-wrap{display:flex;gap:.5rem;margin-bottom:1.5rem}
        .horizon-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:.875rem;padding:1rem;cursor:pointer;text-align:center;transition:all .18s;color:var(--muted)}
        .horizon-btn:hover{border-color:var(--border2);color:var(--text)}
        .horizon-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--text)}
        .h-icon{font-size:1.2rem;margin-bottom:.35rem}
        .h-label{font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem}
        .h-sub{font-size:.58rem;color:var(--muted);margin-top:.15rem}
        .horizon-btn.active .h-sub{color:var(--accent)}

        /* SEC DIVIDER */
        .sec-div{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem}
        .sec-div-label{font-family:'Syne',sans-serif;font-weight:800;font-size:.75rem;white-space:nowrap}
        .sec-div-line{flex:1;height:1px;background:var(--border)}
        .badge{font-size:.5rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .45rem;border-radius:2rem}
        .badge-i1{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
        .badge-i2{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
        .badge-i3{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.25)}

        /* CONSOL STRIP */
        .consol-strip{background:linear-gradient(135deg,var(--surface2),rgba(56,189,248,.04));border:1px solid var(--accent-border);border-radius:1.25rem;overflow:hidden;margin-bottom:1.5rem}
        .cs-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .cs-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
        .cs-title em{color:var(--accent);font-style:normal}
        .cs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr))}
        .cs-cell{padding:1rem 1.5rem;border-right:1px solid var(--border)}
        .cs-cell:last-child{border-right:none}
        .cs-label{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
        .cs-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700}
        .cs-sub{font-size:.6rem;color:var(--muted);margin-top:.2rem}

        /* MODULE CARDS */
        .mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
        .mod-card{background:var(--surface);border:1px solid var(--border);border-radius:1.25rem;overflow:hidden}
        .mod-top{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);position:relative}
        .mod-top::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
        .mc-i1 .mod-top::before{background:var(--accent)}
        .mc-i2 .mod-top::before{background:var(--purple)}
        .mc-i3 .mod-top::before{background:var(--orange)}
        .mod-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;margin-bottom:.1rem}
        .mod-desc{font-size:.6rem;color:var(--muted)}
        .mod-body{padding:.85rem 1.25rem}
        .mod-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border)}
        .mod-row:last-child{border-bottom:none}
        .mod-row-label{font-size:.62rem;color:var(--muted2)}
        .mod-row-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.82rem}
        .mod-total-block{background:var(--surface2);border-top:1px solid var(--border);padding:.85rem 1.25rem}
        .mtb-label{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
        .mtb-val{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700}
        .mtb-sub{font-size:.6rem;color:var(--muted);margin-top:.2rem}
        .mod-partners{padding:.75rem 1.25rem;border-top:1px solid var(--border)}
        .mp-title{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
        .mp-row{display:flex;justify-content:space-between;align-items:baseline;padding:.15rem 0}
        .mp-name-wrap{font-size:.65rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
        .mp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .mp-vals{text-align:right}
        .mp-mes{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700}
        .mp-total-yr{font-size:.58rem;color:var(--muted)}

        /* PHASE LEGEND */
        .phase-legend{display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap}
        .phase-pill{display:flex;align-items:center;gap:.35rem;background:var(--surface2);border:1px solid var(--border2);border-radius:.5rem;padding:.35rem .65rem;font-size:.62rem;color:var(--muted2)}
        .phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

        /* MONTHLY TABLE */
        .month-block{background:var(--surface);border:1px solid var(--border);border-radius:1rem;overflow:hidden;margin-bottom:.75rem}
        .mb-header{background:var(--surface2);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid var(--border)}
        .mb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;display:flex;align-items:center;gap:.5rem}
        .mb-yr-tag{font-size:.6rem;font-weight:600;color:var(--muted);background:var(--surface3);border:1px solid var(--border2);padding:.1rem .4rem;border-radius:.25rem}
        .mb-stats{display:flex;gap:1.25rem;align-items:center}
        .mb-stat{text-align:right}
        .mb-stat-label{font-size:.52rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
        .mb-stat-val{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700}
        .chevron{font-size:.75rem;color:var(--muted);transition:transform .2s}
        .chevron.open{transform:rotate(90deg)}
        .mb-body{display:none}
        .mb-body.open{display:block}

        /* TABLE INNER */
        .tbl-head{display:grid;font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.5rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
        .tbl-row{display:grid;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);align-items:start;transition:background .1s}
        .tbl-row:last-child{border-bottom:none}
        .tbl-row:hover{background:var(--surface2)}
        .tbl-row.r-setup{background:rgba(251,191,36,.025)}
        .phase-tag{font-size:.5rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .4rem;border-radius:2rem;display:inline-block}
        .pt-setup{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
        .pt-cruise{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.25)}

        /* SUMMARY CARDS */
        .sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:.75rem;margin-bottom:1.5rem}
        .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1.1rem 1.25rem;transition:border-color .2s}
        .sum-card:hover{border-color:var(--border2)}
        .sc-label{font-size:.58rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
        .sc-val{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:700}
        .sc-sub{font-size:.65rem;color:var(--muted);margin-top:.25rem}

        @media(max-width:768px){
            .mod-grid{grid-template-columns:1fr}
            .horizon-wrap{flex-wrap:wrap}
            .cs-grid{grid-template-columns:1fr 1fr}
        }
        @media(max-width:480px){
            .tabs-wrap{overflow-x:auto}
            .sum-row{grid-template-columns:1fr 1fr}
        }
    </style>
</head>
<body>

<div id="lock">
    <div class="lock-glow"></div>
    <div class="lock-card">
        <div class="lock-icon">📈</div>
        <div class="lock-logo">Credi<em>Listo</em></div>
        <div class="lock-sub">Proyecciones Financieras</div>
        <div class="lock-badge">Acceso Restringido</div>
        <input type="password" class="lock-input" id="lock-pin" maxlength="4" placeholder="· · · ·"
               onkeydown="if(event.key==='Enter')unlock()"
               oninput="document.getElementById('lock-err').style.display='none'">
        <button class="lock-btn" onclick="unlock()">INGRESAR</button>
        <div id="lock-err">PIN incorrecto</div>
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="header-brand">Credi<em>Listo</em> · Proyecciones</div>
        <div class="header-right">
            <span class="header-tag" id="last-update">Cargando…</span>
        </div>
    </div>
    <div class="tabs-wrap">
        <div class="tab active" onclick="setView('total')"><span class="tab-dot" style="background:#94a3b8"></span>Total Consolidado</div>
        <div class="tab" onclick="setView('inver1')"><span class="tab-dot" style="background:var(--lazaro)"></span>INVER 1</div>
        <div class="tab" onclick="setView('inver2')"><span class="tab-dot" style="background:var(--purple)"></span>INVER 2</div>
        <div class="tab" onclick="setView('inver3')"><span class="tab-dot" style="background:var(--orange)"></span>INVER 3</div>
    </div>
    <div class="main" id="main-content">
        <div class="loading-wrap"><div class="spinner"></div><span>Cargando datos…</span></div>
    </div>
    <div class="status-bar">
        <span><span class="status-dot"></span>Conectado a Firebase · credilistosv</span>
        <span id="ts-label">—</span>
    </div>
</div>

<script>
/* ── PIN ─────────────────────────────── */
function unlock(){
    if(document.getElementById('lock-pin').value==='2025'){
        document.getElementById('lock').style.display='none';
        document.getElementById('app').style.display='block';
        initFirebase();
    } else {
        document.getElementById('lock-err').style.display='block';
        document.getElementById('lock-pin').value='';
        document.getElementById('lock-pin').focus();
    }
}

/* ── FIREBASE ────────────────────────── */
const FB_CFG={
    apiKey:'AIzaSyC1GiJitT0QegrVe9o6CHCsvf7sEZELwRk',
    authDomain:'credilistosv.firebaseapp.com',
    databaseURL:'https://credilistosv-default-rtdb.firebaseio.com',
    projectId:'credilistosv',
    storageBucket:'credilistosv.firebasestorage.app'
};
let db;
let DS={inver1:{},inver2:{},inver3:{}};
let LD={inver1:false,inver2:false,inver3:false};
let VIEW='total';
let HORIZON=1;

/*
 * DISTRIBUCIÓN DE GANANCIAS
 * Los porcentajes suman 20 (la tasa mensual).
 * La fracción de cada socio = pct/20.
 * Sobre la ganancia mensual G: socio_i recibe G × (pct_i / 20).
 */
const SPLITS={
    inver1:[{name:'Lázaro',pct:17,color:'var(--lazaro)'},{name:'Emanuel',pct:3,color:'var(--emanuel)'}],
    inver2:[{name:'Magda',pct:12,color:'var(--magda)'},{name:'Lázaro',pct:4,color:'var(--lazaro)'},{name:'Emanuel',pct:4,color:'var(--emanuel)'}],
    inver3:[{name:'Walter',pct:12,color:'var(--walter)'},{name:'Lázaro',pct:4,color:'var(--lazaro)'},{name:'Emanuel',pct:4,color:'var(--emanuel)'}]
};
const ML={inver1:'INVER 1',inver2:'INVER 2',inver3:'INVER 3'};
const MC={inver1:'var(--accent)',inver2:'var(--purple)',inver3:'var(--orange)'};
const MB={inver1:'badge-i1',inver2:'badge-i2',inver3:'badge-i3'};
const MK={inver1:'mc-i1',inver2:'mc-i2',inver3:'mc-i3'};
const CAP_MAX=4000;
const RATE=0.20;

function initFirebase(){
    firebase.initializeApp(FB_CFG);
    db=firebase.database();
    [['clientes','inver1'],['clientes2','inver2'],['clientes3','inver3']].forEach(([ref,mod])=>{
        db.ref(ref).on('value',snap=>{
            DS[mod]={};
            snap.forEach(c=>{const v=c.val();if(v&&v.tipo==='ACTIVO')DS[mod][c.key]={...v,_mod:mod}});
            LD[mod]=true;
            if(LD.inver1&&LD.inver2&&LD.inver3){
                render();
                const n=new Date();
                document.getElementById('last-update').textContent=n.toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'});
                document.getElementById('ts-label').textContent='Última actualización: '+n.toLocaleString('es-SV');
            }
        });
    });
}

function setView(v){
    VIEW=v;
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['total','inver1','inver2','inver3'][i]===v));
    if(LD.inver1&&LD.inver2&&LD.inver3)render();
}

function $$(n){return parseFloat(n||0)}
function fmt$(n){return '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}

/*
 * ── MODELO DE PROYECCIÓN ─────────────────────────────────────────────────────
 *
 * Regla de negocio:
 *   • Se inyecta capital externo. El primer ciclo genera ganancia.
 *   • Mes 1: Se presta el capital base actual (leído de Firebase).
 *             Al cobrar, se reinvierte capital + ganancia (máx $4,000).
 *   • Mes 2: Capital en juego = min(cap_base + ganancia_m1, $4,000).
 *             Se presta. Al cobrar, se vuelve a reinvertir (ya estamos cerca o en $4k).
 *   • Mes 3 en adelante (CRUCERO):
 *             Capital fijo = min(acumulado_m2 + ganancia_m2, $4,000) → ya no crece.
 *             Cada mes se retira la ganancia. El capital queda intacto = $4,000.
 *             Ganancia mensual constante = $4,000 × 20% = $800 (si cap llegó a $4k).
 *
 * El capital original se recupera íntegro. Las ganancias son ingresos netos retirados.
 * ─────────────────────────────────────────────────────────────────────────────
 */
function buildPlan(capBase,horizonYears){
    const totalM=horizonYears*12;
    const plan=[];
    let cap=Math.min(capBase,CAP_MAX);

    for(let m=1;m<=totalM;m++){
        const gan=cap*RATE;
        let fase,capNext;

        if(m<=2){
            // Arranque: reinvertir capital+ganancia hasta CAP_MAX
            fase='setup';
            capNext=Math.min(cap+gan,CAP_MAX);
        } else {
            // Crucero: retirar ganancia, capital fijo
            fase='cruise';
            capNext=cap; // capital no cambia
        }

        plan.push({mes:m,cap,gan,fase});
        cap=capNext;
    }
    return plan;
}

function planTotals(plan){
    const ganTotal=plan.reduce((s,m)=>s+m.gan,0);
    const cruiseM=plan.find(m=>m.fase==='cruise');
    const ganMes=cruiseM?cruiseM.cap*RATE:plan[plan.length-1].gan;
    const capFijo=cruiseM?cruiseM.cap:plan[plan.length-1].cap;
    return{ganTotal,ganMes,capFijo};
}

/* ── RENDER ──────────────────────────── */
function render(){
    const H=HORIZON;
    const view=VIEW;
    const mods=view==='total'?['inver1','inver2','inver3']:[view];
    const cont=document.getElementById('main-content');

    // Capital base por módulo
    const capBase={};
    ['inver1','inver2','inver3'].forEach(mod=>{
        let t=0;Object.values(DS[mod]).forEach(c=>t+=$$(c.monto));
        capBase[mod]=t;
    });

    // Planes y totales
    const planes={};
    ['inver1','inver2','inver3'].forEach(mod=>planes[mod]=buildPlan(capBase[mod],H));

    // Ganancia total por horizonte (para selector)
    function horizonGan(yr){
        let g=0;
        mods.forEach(mod=>buildPlan(capBase[mod],yr).forEach(m=>g+=m.gan));
        return g;
    }

    // Consolidado visible
    let totalGan=0,totalCapFijo=0,totalGanMes=0;
    mods.forEach(mod=>{
        const t=planTotals(planes[mod]);
        totalGan+=t.ganTotal;totalCapFijo+=t.capFijo;totalGanMes+=t.ganMes;
    });

    const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const nowYear=new Date().getFullYear();

    let h='';

    /* HERO */
    h+=`<div class="page-hero">
        <div class="hero-title">📈 Proyecciones de <em>Ventas</em> — Capital Fijo + Retiro Mensual</div>
        <div class="hero-sub">
            Capital máximo en juego por módulo: <strong style="color:var(--amber)">$4,000</strong> (inyectado + 1ª reinversión) ·
            <strong style="color:var(--green)">Mes 1–2:</strong> reinversión para alcanzar tope ·
            <strong style="color:var(--accent)">Mes 3+:</strong> capital fijo, ganancias <em>retiradas</em> cada mes · Tasa: 20% mensual
        </div>
    </div>`;

    /* METODOLOGÍA */
    h+=`<div class="method-banner">
        <div class="method-icon">📐</div>
        <div>
            <div class="method-title">Metodología — Cómo funciona el ciclo</div>
            <div class="method-steps">
                <div class="method-step"><strong>Mes 1 — Arranque</strong><br>Capital en juego = saldo Firebase actual.<br>Ganancia 20% reinvertida junto al capital.</div>
                <div class="method-step"><strong>Mes 2 — Refuerzo</strong><br>Capital sube hasta $4,000 máx.<br>Ganancia reinvertida por última vez.</div>
                <div class="method-step"><strong>Mes 3+ — Crucero</strong><br>Capital fijo = $4,000.<br>Ganancia <strong>$800/mes se retira</strong>. El capital no crece.</div>
                <div class="method-step"><strong>Al final del horizonte</strong><br>Capital original intacto = $4,000.<br>Ganancias = ingresos netos acumulados.</div>
            </div>
        </div>
    </div>`;

    /* HORIZON */
    h+=`<div class="horizon-wrap">
        ${[1,2,3].map((yr,i)=>`
        <div class="horizon-btn${H===yr?' active':''}" onclick="HORIZON=${yr};render()">
            <div class="h-icon">${['🌱','🌿','🌳'][i]}</div>
            <div class="h-label">${yr} Año${yr>1?'s':''} · ${yr*12} meses</div>
            <div class="h-sub">${fmt$(horizonGan(yr))} en ganancias</div>
        </div>`).join('')}
    </div>`;

    /* CONSOLIDATED STRIP */
    h+=`<div class="consol-strip">
        <div class="cs-header">
            <div class="cs-title">Resumen <em>Consolidado</em> — ${H} Año${H>1?'s':''} · ${H*12} ciclos</div>
        </div>
        <div class="cs-grid">
            <div class="cs-cell">
                <div class="cs-label">🏦 Capital en Juego (crucero)</div>
                <div class="cs-val" style="color:var(--accent)">${fmt$(totalCapFijo)}</div>
                <div class="cs-sub">Fijo desde mes 3 · no crece</div>
            </div>
            <div class="cs-cell">
                <div class="cs-label">💵 Ganancia Mensual Retirada</div>
                <div class="cs-val" style="color:var(--green)">${fmt$(totalGanMes)}</div>
                <div class="cs-sub">Constante cada mes en crucero</div>
            </div>
            <div class="cs-cell">
                <div class="cs-label">✨ Ganancia Total Acumulada</div>
                <div class="cs-val" style="color:var(--amber)">${fmt$(totalGan)}</div>
                <div class="cs-sub">En ${H*12} meses · retirada en efectivo</div>
            </div>
            <div class="cs-cell">
                <div class="cs-label">📅 Ganancia por Año</div>
                <div class="cs-val" style="color:var(--purple)">${fmt$(totalGanMes*12)}</div>
                <div class="cs-sub">En fase crucero (12 meses × ${fmt$(totalGanMes)})</div>
            </div>
        </div>
    </div>`;

    /* MODULE CARDS */
    h+=`<div class="sec-div"><span class="sec-div-label">Proyección por Módulo</span><div class="sec-div-line"></div><span class="badge badge-i1" style="font-size:.6rem;padding:.2rem .55rem">${H} AÑO${H>1?'S':''}</span></div>`;
    h+=`<div class="mod-grid" style="${mods.length===1?'grid-template-columns:1fr;max-width:480px':''}">`;

    ['inver1','inver2','inver3'].forEach(mod=>{
        if(view!=='total'&&view!==mod)return;
        const plan=planes[mod];
        const{ganTotal,ganMes,capFijo}=planTotals(plan);
        const ganAnual=ganMes*12;

        h+=`<div class="mod-card ${MK[mod]}">
            <div class="mod-top">
                <div class="mod-name" style="color:${MC[mod]}">${ML[mod]}</div>
                <div class="mod-desc">Capital Firebase: ${fmt$(capBase[mod])} · Máx. en juego: ${fmt$(CAP_MAX)}</div>
            </div>
            <div class="mod-body">
                <div class="mod-row">
                    <span class="mod-row-label">Capital en juego (mes 3+)</span>
                    <span class="mod-row-val" style="color:${MC[mod]}">${fmt$(capFijo)}</span>
                </div>
                <div class="mod-row">
                    <span class="mod-row-label">Ganancia mensual retirada</span>
                    <span class="mod-row-val" style="color:var(--green)">${fmt$(ganMes)}</span>
                </div>
                <div class="mod-row">
                    <span class="mod-row-label">Ganancia anual (crucero)</span>
                    <span class="mod-row-val" style="color:var(--amber)">${fmt$(ganAnual)}</span>
                </div>
                <div class="mod-row">
                    <span class="mod-row-label">Capital intacto al final</span>
                    <span class="mod-row-val" style="color:var(--muted2)">${fmt$(capFijo)}</span>
                </div>
            </div>
            <div class="mod-total-block">
                <div class="mtb-label">Total ganancia retirada en ${H} año${H>1?'s':''}</div>
                <div class="mtb-val" style="color:${MC[mod]}">${fmt$(ganTotal)}</div>
                <div class="mtb-sub">Capital original no tocado = ${fmt$(capFijo)}</div>
            </div>
            <div class="mod-partners">
                <div class="mp-title">Ingreso mensual por socio (crucero)</div>
                ${SPLITS[mod].map(s=>{
                    const ganSocioMes=ganMes*(s.pct/20);
                    const ganSocioTotal=ganSocioMes*H*12;
                    return `<div class="mp-row">
                        <span class="mp-name-wrap"><span class="mp-dot" style="background:${s.color}"></span>${s.name} <span style="color:var(--muted);font-size:.6rem">(${s.pct}%)</span></span>
                        <span class="mp-vals">
                            <div class="mp-mes" style="color:${s.color}">${fmt$(ganSocioMes)}<span style="font-size:.6rem;font-weight:400;color:var(--muted)">/mes</span></div>
                            <div class="mp-total-yr">${fmt$(ganSocioTotal)} en ${H}a</div>
                        </span>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    });
    h+=`</div>`;

    /* MONTHLY TABLES */
    h+=`<div class="sec-div"><span class="sec-div-label">Desglose Mensual Detallado</span><div class="sec-div-line"></div></div>`;
    h+=`<div class="phase-legend">
        <div class="phase-pill"><span class="phase-dot" style="background:var(--amber)"></span>Meses 1–2 · Fase Arranque (reinversión → alcanzar $4,000)</div>
        <div class="phase-pill"><span class="phase-dot" style="background:var(--green)"></span>Mes 3+ · Fase Crucero (capital fijo · ganancia retirada mensualmente)</div>
    </div>`;

    for(let yr=1;yr<=H;yr++){
        const s=(yr-1)*12;
        const e=yr*12;
        const calYear=nowYear+yr-1;

        // year-level totals
        let yrGan=0;
        mods.forEach(mod=>planes[mod].slice(s,e).forEach(m=>yrGan+=m.gan));
        const cruisePlan=planes[mods[0]][Math.min(2,planes[mods[0]].length-1)];
        let yrCruiseMes=0;
        mods.forEach(mod=>{
            const cp=planes[mod][Math.min(2,planes[mod].length-1)];
            if(cp)yrCruiseMes+=cp.cap*RATE;
        });

        const colId=`yr${yr}`;
        // grid: mes | fase | one col per mod
        const cols=`80px 100px ${mods.map(()=>'1fr').join(' ')}`;

        h+=`<div class="month-block">
            <div class="mb-header" onclick="toggleMB('${colId}')">
                <div class="mb-title">📅 Año ${yr} <span class="mb-yr-tag">${calYear}</span></div>
                <div class="mb-stats">
                    <div class="mb-stat">
                        <div class="mb-stat-label">Ganancia del año</div>
                        <div class="mb-stat-val" style="color:var(--green)">${fmt$(yrGan)}</div>
                    </div>
                    <div class="mb-stat">
                        <div class="mb-stat-label">Gan. mensual crucero</div>
                        <div class="mb-stat-val" style="color:var(--amber)">${fmt$(yrCruiseMes)}</div>
                    </div>
                    <span class="chevron${yr===1?' open':''}" id="chev-${colId}">▶</span>
                </div>
            </div>
            <div class="mb-body${yr===1?' open':''}" id="body-${colId}">
                <div class="tbl-head" style="grid-template-columns:${cols}">
                    <span>Mes</span><span>Fase</span>
                    ${mods.map(mod=>`<span>${ML[mod]}</span>`).join('')}
                </div>`;

        for(let m=s+1;m<=e;m++){
            const mi=m-1;
            const mesLabel=MESES[(m-1)%12];
            const fase=planes[mods[0]][mi]?.fase||'cruise';

            h+=`<div class="tbl-row r-${fase}" style="grid-template-columns:${cols}">
                <div>
                    <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.72rem">M${m}</div>
                    <div style="font-size:.58rem;color:var(--muted)">${mesLabel}</div>
                </div>
                <div><span class="phase-tag pt-${fase}">${fase==='setup'?'⚡ Arranque':'✅ Crucero'}</span></div>
                ${mods.map(mod=>{
                    const pm=planes[mod][mi];
                    if(!pm)return'<div>—</div>';
                    return`<div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:.25rem">
                            <span style="font-size:.6rem;color:var(--muted2)">Capital:</span>
                            <span style="font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;color:${MC[mod]}">${fmt$(pm.cap)}</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
                            <span style="font-size:.6rem;color:var(--muted2)">${fase==='cruise'?'Retiro:':'Reinvierte:'}</span>
                            <span style="font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;color:var(--green)">${fmt$(pm.gan)}</span>
                        </div>
                        <div style="border-top:1px solid var(--border);padding-top:.25rem;margin-top:.1rem">
                        ${SPLITS[mod].map(s=>{
                            const gs=pm.gan*(s.pct/20);
                            return`<div style="display:flex;justify-content:space-between">
                                <span style="font-size:.58rem;color:${s.color}">${s.name}:</span>
                                <span style="font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:600;color:${s.color}">${fmt$(gs)}</span>
                            </div>`;
                        }).join('')}
                        </div>
                    </div>`;
                }).join('')}
            </div>`;
        }
        h+=`</div></div>`;
    }

    /* PARTNER TOTALS */
    h+=`<div class="sec-div"><span class="sec-div-label">Ingreso Total por Socio — ${H} Año${H>1?'s':''}</span><div class="sec-div-line"></div></div>`;

    const partnerMap={};
    mods.forEach(mod=>{
        const{ganTotal,ganMes}=planTotals(planes[mod]);
        SPLITS[mod].forEach(s=>{
            if(!partnerMap[s.name])partnerMap[s.name]={name:s.name,color:s.color,total:0,mes:0,byMod:{}};
            const ganSocioTotal=ganTotal*(s.pct/20);
            const ganSocioMes=ganMes*(s.pct/20);
            partnerMap[s.name].total+=ganSocioTotal;
            partnerMap[s.name].mes+=ganSocioMes;
            partnerMap[s.name].byMod[mod]={total:ganSocioTotal,mes:ganSocioMes};
        });
    });

    h+=`<div class="sum-row">`;
    Object.values(partnerMap).sort((a,b)=>b.total-a.total).forEach(p=>{
        const detail=Object.entries(p.byMod).map(([mod,v])=>`${ML[mod]}: ${fmt$(v.total)}`).join(' · ');
        h+=`<div class="sum-card">
            <div class="sc-label" style="color:${p.color}">👤 ${p.name}</div>
            <div class="sc-val" style="color:${p.color}">${fmt$(p.total)}</div>
            <div class="sc-sub" style="color:var(--green)">${fmt$(p.mes)}/mes en crucero</div>
            <div class="sc-sub">${detail}</div>
        </div>`;
    });
    h+=`</div>`;

    cont.innerHTML=h;
}

function toggleMB(id){
    const b=document.getElementById('body-'+id);
    const c=document.getElementById('chev-'+id);
    const open=b.classList.toggle('open');
    c.classList.toggle('open',open);
}
</script>
</body>
</html>
