<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f8fafc; --sky: #0ea5e9; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .input-field { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 0.6rem; border-radius: 0.8rem; width: 100%; color: #0f172a; font-size: 0.85rem; font-weight: 600; }
        .label-style { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin-bottom: 2px; display: block; }
        #bloqueo { background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; position: fixed; inset: 0; }
    </style>
</head>
<body class="pb-20">

    <div id="bloqueo">
        <div class="text-center p-8 bg-white rounded-[2.5rem] shadow-2xl w-80">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="font-black text-slate-800 uppercase italic mb-2">Acceso Privado</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-6">Introduce el PIN</p>
            
            <div class="relative mb-4">
                <input type="password" id="pin-acceso" inputmode="numeric" autocomplete="new-password" placeholder="****" 
                    class="w-full p-4 bg-slate-100 border-none rounded-2xl text-center text-2xl font-black tracking-[0.5em] outline-none focus:ring-2 focus:ring-sky-500">
                <button type="button" onclick="togglePin()" class="absolute right-4 top-1/2 -translate-y-1/2 text-xl">👁️</button>
            </div>

            <button onclick="verificarAcceso()" class="w-full py-4 bg-sky-600 text-white font-black rounded-2xl uppercase shadow-lg hover:bg-sky-700 transition-all">Entrar al Sistema</button>
        </div>
    </div>

    <div id="contenido-protegido" class="hidden">
        <nav class="p-4 bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <button onclick="location.href='gestionar.html'" class="text-sky-600 font-bold text-xs uppercase tracking-widest">← VOLVER</button>
                    <h1 class="font-black text-slate-800 tracking-tighter text-lg uppercase italic">Santiago de María</h1>
                </div>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="🔍 Buscar cliente..." class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none text-sm font-bold shadow-inner">
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 mt-6">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase leading-tight">Inversión</p>
                    <p id="stat-inversion" class="text-lg font-black text-slate-800">$0.00</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                    <p class="text-[8px] font-black text-sky-500 uppercase leading-tight">Ganancia</p>
                    <p id="stat-ganancia" class="text-lg font-black text-sky-600">$0.00</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl text-center shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase italic">Recuperar</p>
                    <p id="stat-recuperar" class="text-lg font-black text-white">$0.00</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200 border-l-4 border-l-green-500 text-center shadow-sm">
                    <p class="text-[8px] font-black text-green-600 uppercase">Cobrado Hoy</p>
                    <p id="stat-hoy" class="text-lg font-black text-green-600">$0.00</p>
                </div>
                <button onclick="ejecutarCierre()" class="col-span-2 md:col-span-1 bg-red-600 p-4 rounded-2xl text-center text-white font-black text-[10px] uppercase italic">Cierre Mensual</button>
            </div>
            <div id="lista-clientes" class="space-y-3"></div>
        </main>
    </div>

    <div id="modalM" class="fixed inset-0 z-[100] hidden overflow-y-auto bg-slate-100/95 backdrop-blur-md">
        <div class="min-h-screen p-4">
            <div class="max-w-3xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 p-6 mb-10">
                <div class="flex justify-between items-start mb-6">
                    <h2 id="m-nombre" class="text-2xl font-black text-slate-900 uppercase italic">NOMBRE</h2>
                    <button onclick="cerrarM()" class="bg-slate-100 p-3 rounded-full text-slate-400">✕</button>
                </div>
                <div id="tabla-cuotas" class="space-y-2"></div>
                <div class="mt-8 border-t pt-4">
                    <button onclick="guardarFicha()" class="w-full py-4 bg-sky-600 text-white font-black rounded-2xl uppercase">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MI_CLAVE_MAESTRA = "2025";
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        function togglePin() {
            const p = document.getElementById('pin-acceso');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function verificarAcceso() {
            // .trim() quita espacios, .replace quita cualquier cosa que no sea número
            const valorIngresado = document.getElementById('pin-acceso').value.trim();
            
            if(valorIngresado === MI_CLAVE_MAESTRA) {
                sessionStorage.setItem('acceso_ok', 'true');
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('contenido-protegido').classList.remove('hidden');
                cargar();
            } else {
                alert("PIN INCORRECTO");
                document.getElementById('pin-acceso').value = "";
            }
        }

        window.onload = () => {
            if(sessionStorage.getItem('acceso_ok') === 'true') {
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('contenido-protegido').classList.remove('hidden');
                cargar();
            }
        };

        function cargar() {
            db.ref('clientes').on('value', snap => {
                const hoy = new Date().toLocaleDateString('es-SV');
                let tInv = 0, tHoy = 0;
                const container = document.getElementById('lista-clientes');
                container.innerHTML = "";
                snap.forEach(c => {
                    const s = c.val();
                    if (s.tipo === "ACTIVO") {
                        const m = parseFloat(s.monto || 0);
                        tInv += m;
                        if(s.cuotas) s.cuotas.forEach(cuo => { if(cuo.pagada && cuo.fecha === hoy) tHoy += parseFloat(cuo.valorPagado); });
                        container.innerHTML += `
                            <div class="card p-5 flex justify-between items-center item-c" data-n="${s.nombre}">
                                <div><h3 class="font-black uppercase text-slate-800 text-[13px]">${s.nombre}</h3>
                                <p class="text-[9px] font-bold text-slate-400">Saldo: $${parseFloat(s.saldo || 0).toFixed(2)}</p></div>
                                <button onclick="ver('${c.key}')" class="bg-sky-500 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Ver</button>
                            </div>`;
                    }
                });
                document.getElementById('stat-inversion').innerText = `$${tInv.toFixed(2)}`;
                document.getElementById('stat-ganancia').innerText = `$${(tInv*0.2).toFixed(2)}`;
                document.getElementById('stat-recuperar').innerText = `$${(tInv*1.2).toFixed(2)}`;
                document.getElementById('stat-hoy').innerText = `$${tHoy.toFixed(2)}`;
            });
        }

        async function ver(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();
            document.getElementById('m-nombre').innerText = s.nombre;
            const t = document.getElementById('tabla-cuotas'); t.innerHTML = "";
            (s.cuotas || []).forEach((c, i) => {
                t.innerHTML += `<div class="${c.pagada ? 'opacity-40' : 'bg-white border'} p-3 rounded-xl flex items-center gap-2">
                    <span class="text-[9px] font-black text-slate-300">#${c.n}</span>
                    <input type="number" id="v-${i}" value="${c.valorPagado}" class="w-16 bg-slate-50 rounded-lg text-xs font-black p-2">
                    <input type="date" id="f-${i}" value="${c.fecha_ISO || ''}" class="flex-1 bg-slate-50 rounded-lg text-[9px] font-bold p-2">
                    ${!c.pagada ? `<button onclick="pagar(${i})" class="bg-sky-500 text-white font-black text-[9px] px-3 py-2 rounded-lg">OK</button>` : `<span class="text-green-600 text-[8px] font-black">PAGADO</span>`}
                </div>`;
            });
            document.getElementById('modalM').classList.remove('hidden');
        }

        async function pagar(i) {
            const v = parseFloat(document.getElementById(`v-${i}`).value);
            const fISO = document.getElementById(`f-${i}`).value || new Date().toISOString().split('T')[0];
            const snap = await db.ref('clientes/' + currentId).once('value');
            let s = snap.val();
            s.cuotas[i].pagada = true;
            s.cuotas[i].valorPagado = v;
            s.cuotas[i].fecha_ISO = fISO;
            s.cuotas[i].fecha = fISO.split('-').reverse().join('/');
            s.saldo = parseFloat(s.saldo || s.total) - v;
            await db.ref('clientes/' + currentId).update(s);
            ver(currentId);
        }

        function cerrarM() { document.getElementById('modalM').classList.add('hidden'); }
        function filtrar() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.item-c').forEach(i => {
                i.style.display = (i.dataset.n.toLowerCase()).includes(b) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
