<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pagos | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .input-pago { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 0.8rem; color: white; outline: none; font-size: 0.8rem; width: 100%; }
        .card-cliente { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .card-cliente:hover { border-color: var(--cyan); }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 border-b border-white/5 sticky top-0 bg-[#050b16]/90 backdrop-blur-md z-50">
        <div class="max-w-5xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <button onclick="location.href='gestionar.html'" class="text-cyan-500 text-xs font-black uppercase">← Volver</button>
                <p class="font-black italic text-cyan-400 uppercase">Gestión de Pagos</p>
            </div>
            <input type="text" id="buscador" onkeyup="filtrarClientes()" placeholder="Buscar por Nombre o DUI..." class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl px-6 outline-none focus:border-cyan-500 text-sm">
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 mt-8">
        <div id="lista-activos" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <div id="modalGestion" class="fixed inset-0 bg-black/98 z-[300] hidden flex-col overflow-y-auto p-6">
        <div class="max-w-2xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 id="m-nombre" class="text-2xl font-black text-cyan-400 italic uppercase">Nombre Cliente</h2>
                <button onclick="cerrarModal()" class="text-slate-500 font-black uppercase text-xs">Cerrar</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl text-center">
                    <p class="text-[8px] text-slate-500 uppercase font-black">Préstamo + Int.</p>
                    <p id="c-total" class="text-lg font-black">$0.00</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl text-center border border-green-500/20">
                    <p class="text-[8px] text-green-500 uppercase font-black">Pagado</p>
                    <p id="c-pagado" class="text-lg font-black text-green-400">$0.00</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl text-center border border-red-500/20">
                    <p class="text-[8px] text-red-500 uppercase font-black">Debe</p>
                    <p id="c-debe" class="text-lg font-black text-red-400">$0.00</p>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">Plan de Pagos</h3>
                <div id="tabla-cuotas" class="space-y-2">
                    </div>
            </div>

            <div class="bg-white/5 p-6 rounded-[30px] border border-white/10 space-y-6">
                <h3 class="text-xs font-black uppercase text-cyan-400">Ficha Técnica y Documentos</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="e-nombre" placeholder="Nombre" class="input-pago">
                    <input type="text" id="e-dui" placeholder="DUI" class="input-pago">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="e-tel" placeholder="Teléfono" class="input-pago">
                    <input type="text" id="e-pass" placeholder="Contraseña App" class="input-pago">
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <div>
                        <label class="text-[9px] uppercase font-black text-slate-500 block mb-2">Contrato Digital</label>
                        <input type="file" id="f-contrato" class="text-[9px] block w-full">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-black text-slate-500 block mb-2">Letra de Cambio</label>
                        <input type="file" id="f-letra" class="text-[9px] block w-full">
                    </div>
                </div>

                <div class="flex gap-2 pt-4">
                    <button onclick="actualizarDatos()" class="flex-1 py-4 bg-cyan-500 text-[#050b16] font-black uppercase rounded-2xl text-xs">Actualizar Ficha</button>
                    <button onclick="cerrarCiclo()" class="flex-1 py-4 bg-white text-black font-black uppercase rounded-2xl text-xs">Cerrar Ciclo (Finalizar)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", projectId: "credilistosv" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        // CARGAR CLIENTES ACTIVOS
        function cargarClientes() {
            db.ref('clientes').on('value', (snap) => {
                const container = document.getElementById('lista-activos');
                container.innerHTML = "";
                snap.forEach((child) => {
                    const s = child.val();
                    if (s.tipo === "ACTIVO") {
                        container.innerHTML += `
                            <div class="card-cliente p-6 rounded-[25px] flex justify-between items-center item-cliente" data-nombre="${s.nombre}" data-dui="${s.dui}">
                                <div>
                                    <h3 class="font-black uppercase text-white">${s.nombre}</h3>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase">Saldo Pendiente: $${s.saldo.toFixed(2)}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="gestionarPago('${child.key}')" class="bg-cyan-500/10 text-cyan-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Gestión</button>
                                    <button onclick="eliminarCliente('${child.key}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Eliminar</button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        // BÚSQUEDA FILTRADA
        function filtrarClientes() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const items = document.querySelectorAll('.item-cliente');
            items.forEach(item => {
                const texto = item.getAttribute('data-nombre').toLowerCase() + item.getAttribute('data-dui');
                item.style.display = texto.includes(busqueda) ? "flex" : "none";
            });
        }

        // MODAL DE GESTIÓN
        async function gestionarPago(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();

            document.getElementById('m-nombre').innerText = s.nombre;
            document.getElementById('c-total').innerText = `$${s.total.toFixed(2)}`;
            document.getElementById('c-pagado').innerText = `$${(s.total - s.saldo).toFixed(2)}`;
            document.getElementById('c-debe').innerText = `$${s.saldo.toFixed(2)}`;
            
            // Llenar ficha de edición
            document.getElementById('e-nombre').value = s.nombre;
            document.getElementById('e-dui').value = s.dui;
            document.getElementById('e-tel').value = s.tel;
            document.getElementById('e-pass').value = s.pass;

            // Renderizar cuotas
            const tabla = document.getElementById('tabla-cuotas');
            tabla.innerHTML = "";
            s.cuotas.forEach((c, index) => {
                const checked = c.pagada ? 'bg-green-500/20 border-green-500' : 'bg-white/5 border-white/5';
                const opacity = c.pagada ? 'opacity-50' : 'opacity-100';
                
                tabla.innerHTML += `
                    <div class="${checked} ${opacity} p-4 rounded-2xl flex items-center gap-3 border transition-all">
                        <div class="text-[10px] font-black text-slate-500 w-8">#${c.n}</div>
                        <input type="number" id="val-${index}" value="${c.valorPagado}" class="w-20 bg-black/20 border-none rounded-lg text-xs font-black p-1 text-center" ${c.pagada ? 'disabled' : ''}>
                        <input type="text" id="fec-${index}" value="${c.fecha || ''}" placeholder="DD/MM" class="w-16 bg-black/20 border-none rounded-lg text-[10px] p-1 text-center" ${c.pagada ? 'disabled' : ''}>
                        <div class="flex-1"></div>
                        ${!c.pagada ? `<button onclick="confirmarCuota(${index})" class="bg-cyan-500 text-black font-black text-[9px] px-3 py-2 rounded-lg uppercase">Cobrar</button>` : `<span class="text-green-500 text-[9px] font-black uppercase">✓ Pagado</span>`}
                    </div>`;
            });

            document.getElementById('modalGestion').style.display = "flex";
        }

        async function confirmarCuota(index) {
            const pin = prompt("Confirma con clave de seguridad:");
            if(pin !== "lazaroemanuel") return alert("Clave incorrecta");

            const montoEditado = parseFloat(document.getElementById(`val-${index}`).value);
            const fechaEditada = document.getElementById(`fec-${index}`).value || new Date().toLocaleDateString();

            const snap = await db.ref('clientes/' + currentId).once('value');
            let s = snap.val();

            // Actualizar la cuota específica
            s.cuotas[index].pagada = true;
            s.cuotas[index].valorPagado = montoEditado;
            s.cuotas[index].fecha = fechaEditada;

            // Recalcular saldo general
            s.saldo = s.saldo - montoEditado;

            await db.ref('clientes/' + currentId).update(s);
            gestionarPago(currentId); // Refrescar modal
        }

        async function actualizarDatos() {
            const updates = {
                nombre: document.getElementById('e-nombre').value.toUpperCase(),
                dui: document.getElementById('e-dui').value,
                tel: document.getElementById('e-tel').value,
                pass: document.getElementById('e-pass').value
            };
            await db.ref('clientes/' + currentId).update(updates);
            alert("Ficha actualizada correctamente");
        }

        async function cerrarCiclo() {
            if(confirm("¿Deseas cerrar este ciclo? Se guardará en el historial y se borrará de activos.")){
                const snap = await db.ref('clientes/' + currentId).once('value');
                const s = snap.val();
                // Guardar en nodo 'historial'
                await db.ref('historial').push({ ...s, fechaCierre: new Date().toLocaleDateString() });
                // Eliminar de 'clientes'
                await db.ref('clientes/' + currentId).remove();
                cerrarModal();
            }
        }

        function eliminarCliente(id) {
            if(confirm("¿Eliminar permanentemente a este cliente?")) {
                db.ref('clientes/' + id).remove();
            }
        }

        function cerrarModal() { document.getElementById('modalGestion').style.display = "none"; }
        
        cargarClientes();
    </script>
</body>
</html>
