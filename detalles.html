<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pagos | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --dark: #050b16; --cyan: #00d2ff; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; }
        .input-pago { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 1rem; color: white; outline: none; width: 100%; font-size: 0.9rem; }
        .card-cliente { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 border-b border-white/5 sticky top-0 bg-[#050b16]/95 backdrop-blur-md z-50">
        <div class="max-w-5xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <button onclick="location.href='gestionar.html'" class="text-cyan-500 text-[10px] font-black uppercase tracking-widest">← Volver</button>
                <p class="font-black italic text-cyan-400 uppercase text-sm">Cobros Santiago de María</p>
            </div>
            <input type="text" id="buscador" onkeyup="filtrarClientes()" placeholder="Escribe nombre o DUI para buscar..." class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl px-6 outline-none focus:border-cyan-500 text-sm">
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 mt-8">
        <div id="lista-activos" class="grid grid-cols-1 gap-3">
            <p class="text-center text-slate-600 animate-pulse py-10">Cargando clientes activos...</p>
        </div>
    </main>

    <div id="modalGestion" class="fixed inset-0 bg-black/98 z-[300] hidden flex-col overflow-y-auto p-4">
        <div class="max-w-2xl mx-auto w-full pt-10 pb-20">
            <div class="flex justify-between items-center mb-6">
                <h2 id="m-nombre" class="text-2xl font-black text-white italic uppercase leading-none">Cargando...</h2>
                <button onclick="cerrarModal()" class="bg-white/10 p-3 rounded-full text-white">✕</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-8">
                <div class="bg-white/5 p-4 rounded-3xl text-center">
                    <p class="text-[7px] text-slate-500 uppercase font-black mb-1">Préstamo</p>
                    <p id="c-total" class="text-sm font-black text-white">$0.00</p>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl text-center border border-green-500/10">
                    <p class="text-[7px] text-green-500 uppercase font-black mb-1">Abonado</p>
                    <p id="c-pagado" class="text-sm font-black text-green-400">$0.00</p>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl text-center border border-red-500/10">
                    <p class="text-[7px] text-red-500 uppercase font-black mb-1">Pendiente</p>
                    <p id="c-debe" class="text-sm font-black text-red-400">$0.00</p>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-4 px-2">Control de Cuotas</h3>
                <div id="tabla-cuotas" class="space-y-2"></div>
            </div>

            <div class="bg-white/5 p-6 rounded-[35px] border border-white/5 space-y-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 mb-2">Editar Información / Documentos</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="e-nombre" class="input-pago" placeholder="Nombre">
                    <input type="text" id="e-dui" class="input-pago" placeholder="DUI">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="tel" id="e-tel" class="input-pago" placeholder="WhatsApp">
                    <input type="text" id="e-pass" class="input-pago" placeholder="Clave Cliente">
                </div>
                
                <div class="grid grid-cols-2 gap-4 py-4">
                    <div class="bg-white/5 p-4 rounded-2xl border border-dashed border-white/10 text-center">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-2">Contrato</p>
                        <input type="file" id="f-contrato" class="text-[10px] w-full text-slate-400">
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-dashed border-white/10 text-center">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-2">Letra Cambio</p>
                        <input type="file" id="f-letra" class="text-[10px] w-full text-slate-400">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="actualizarDatos()" class="bg-cyan-500 text-black font-black py-4 rounded-2xl text-[10px] uppercase">Guardar Cambios</button>
                    <button onclick="cerrarCiclo()" class="bg-white text-black font-black py-4 rounded-2xl text-[10px] uppercase italic">Finalizar Crédito</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", projectId: "credilistosv" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        function cargarClientes() {
            db.ref('clientes').on('value', (snap) => {
                const container = document.getElementById('lista-activos');
                container.innerHTML = "";
                let hayActivos = false;

                snap.forEach((child) => {
                    const s = child.val();
                    if (s.tipo === "ACTIVO") {
                        hayActivos = true;
                        const saldo = s.saldo || 0;
                        container.innerHTML += `
                            <div class="card-cliente p-5 rounded-[25px] flex justify-between items-center item-cliente" data-nombre="${s.nombre}" data-dui="${s.dui}">
                                <div>
                                    <h3 class="font-black uppercase text-white leading-none mb-1 text-sm">${s.nombre}</h3>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Saldo: <span class="text-cyan-400">$${parseFloat(saldo).toFixed(2)}</span></p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="gestionarPago('${child.key}')" class="bg-cyan-500/10 text-cyan-400 p-3 rounded-xl text-[9px] font-black uppercase">GESTIÓN</button>
                                    <button onclick="eliminarCliente('${child.key}')" class="bg-red-500/10 text-red-500 p-3 rounded-xl text-[9px] font-black uppercase">✕</button>
                                </div>
                            </div>`;
                    }
                });
                if(!hayActivos) container.innerHTML = "<p class='text-center text-slate-700 py-10 text-xs uppercase font-black'>No hay clientes activos en este momento</p>";
            });
        }

        async function gestionarPago(id) {
            currentId = id;
            const snap = await db.ref('clientes/' + id).once('value');
            const s = snap.val();

            document.getElementById('m-nombre').innerText = s.nombre;
            document.getElementById('c-total').innerText = `$${parseFloat(s.total || 0).toFixed(2)}`;
            document.getElementById('c-pagado').innerText = `$${(parseFloat(s.total || 0) - parseFloat(s.saldo || 0)).toFixed(2)}`;
            document.getElementById('c-debe').innerText = `$${parseFloat(s.saldo || 0).toFixed(2)}`;
            
            document.getElementById('e-nombre').value = s.nombre;
            document.getElementById('e-dui').value = s.dui;
            document.getElementById('e-tel').value = s.tel || "";
            document.getElementById('e-pass').value = s.pass || "";

            const tabla = document.getElementById('tabla-cuotas');
            tabla.innerHTML = "";
            const cuotas = s.cuotas || [];

            cuotas.forEach((c, index) => {
                const estatusClase = c.pagada ? 'bg-green-500/10 border-green-500/30' : 'bg-white/5 border-white/10';
                tabla.innerHTML += `
                    <div class="${estatusClase} p-4 rounded-2xl flex items-center gap-2 border">
                        <span class="text-[9px] font-black text-slate-500">#${c.n}</span>
                        <input type="number" id="val-${index}" value="${c.valorPagado}" class="w-16 bg-black/40 border-none rounded-lg text-xs font-black p-2 text-center text-white" ${c.pagada ? 'disabled' : ''}>
                        <input type="text" id="fec-${index}" value="${c.fecha || ''}" placeholder="DD/MM" class="w-16 bg-black/40 border-none rounded-lg text-[10px] p-2 text-center text-white" ${c.pagada ? 'disabled' : ''}>
                        <div class="flex-1"></div>
                        ${!c.pagada ? 
                            `<button onclick="confirmarCuota(${index})" class="bg-cyan-500 text-black font-black text-[9px] px-4 py-2 rounded-lg uppercase">Cobrar</button>` : 
                            `<span class="text-green-500 text-[8px] font-black uppercase mr-2">✓ PAGADO</span>`
                        }
                    </div>`;
            });

            document.getElementById('modalGestion').style.display = "flex";
        }

        async function confirmarCuota(index) {
            const pin = prompt("Ingresa PIN de seguridad:");
            if(pin !== "lazaroemanuel") return;

            const montoEditado = parseFloat(document.getElementById(`val-${index}`).value);
            const fechaManual = document.getElementById(`fec-${index}`).value || new Date().toLocaleDateString('es-SV', {day:'2-digit', month:'2-digit'});

            const snap = await db.ref('clientes/' + currentId).once('value');
            let s = snap.val();

            s.cuotas[index].pagada = true;
            s.cuotas[index].valorPagado = montoEditado;
            s.cuotas[index].fecha = fechaManual;
            s.saldo = parseFloat(s.saldo) - montoEditado;

            await db.ref('clientes/' + currentId).update(s);
            gestionarPago(currentId);
        }

        function filtrarClientes() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.item-cliente').forEach(item => {
                const t = item.getAttribute('data-nombre').toLowerCase() + item.getAttribute('data-dui');
                item.style.display = t.includes(b) ? "flex" : "none";
            });
        }

        async function actualizarDatos() {
            await db.ref('clientes/' + currentId).update({
                nombre: document.getElementById('e-nombre').value.toUpperCase(),
                dui: document.getElementById('e-dui').value,
                tel: document.getElementById('e-tel').value,
                pass: document.getElementById('e-pass').value
            });
            alert("Información actualizada");
        }

        async function cerrarCiclo() {
            if(confirm("¿Finalizar crédito y mover a historial?")){
                const snap = await db.ref('clientes/' + currentId).once('value');
                await db.ref('historial').push({ ...snap.val(), fechaFinal: new Date().toLocaleDateString() });
                await db.ref('clientes/' + currentId).remove();
                cerrarModal();
            }
        }

        function eliminarCliente(id) {
            if(confirm("¿Eliminar cliente activo?")) db.ref('clientes/' + id).remove();
        }

        function cerrarModal() { document.getElementById('modalGestion').style.display = "none"; }
        
        cargarClientes();
    </script>
</body>
</html>
