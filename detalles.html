<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión y Estadísticas | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #f8fafc; }
        body { background-color: var(--bg); color: #1e293b; font-family: 'Inter', sans-serif; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card { background: white; padding: 1rem; border-radius: 1.2rem; border: 1px solid #e2e8f0; text-align: center; }
    </style>
</head>
<body class="pb-10">

    <nav class="p-4 bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <button onclick="location.href='gestionar.html'" class="text-sky-600 font-bold text-sm">← VOLVER</button>
                <h1 class="font-black text-slate-800 tracking-tighter text-lg uppercase">Cobros Santiago de María</h1>
            </div>
            <input type="text" id="buscador" onkeyup="filtrarClientes()" placeholder="🔍 Buscar cliente..." class="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl outline-none text-sm">
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 mt-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="stat-card">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Dinero en Calle</p>
                <p id="stat-calle" class="text-lg font-black text-slate-800">$0.00</p>
            </div>
            <div class="stat-card border-l-4 border-l-green-500">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Recogido Hoy</p>
                <p id="stat-hoy" class="text-lg font-black text-green-600">$0.00</p>
            </div>
            <div class="stat-card">
                <p class="text-[9px] font-black text-slate-400 uppercase italic">Ganancia Bruta</p>
                <p id="stat-ganancia" class="text-lg font-black text-sky-600">$0.00</p>
            </div>
            <div class="stat-card bg-slate-900">
                <p class="text-[9px] font-black text-slate-500 uppercase italic">Total Mes</p>
                <p id="stat-mes" class="text-lg font-black text-white">$0.00</p>
            </div>
        </div>

        <button onclick="ejecutarCierreMensual()" class="w-full mb-8 py-3 bg-red-50 text-red-600 text-[10px] font-black uppercase tracking-widest rounded-xl border border-red-100 hover:bg-red-600 hover:text-white transition-all">
            ⚠ Ejecutar Cierre de Ciclo Mensual
        </button>

        <div id="lista-activos" class="grid grid-cols-1 gap-3">
            </div>
    </main>

    <div id="modalGestion" class="fixed inset-0 z-[100] hidden overflow-y-auto bg-white">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 id="m-nombre" class="text-xl font-black uppercase italic">Nombre</h2>
                <button onclick="cerrarModal()" class="text-slate-400 text-2xl">✕</button>
            </div>
            <div id="tabla-cuotas" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://credilistosv-default-rtdb.firebaseio.com", projectId: "credilistosv" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentId = null;

        // CARGAR DATOS Y ESTADÍSTICAS
        function cargarDatos() {
            db.ref('clientes').on('value', (snap) => {
                let hoy = new Date().toLocaleDateString('es-SV');
                let mesActual = new Date().getMonth();
                
                let totalCalle = 0; let totalGanancia = 0;
                let totalHoy = 0; let totalMes = 0;

                const container = document.getElementById('lista-activos');
                container.innerHTML = "";

                snap.forEach((child) => {
                    const s = child.val();
                    if (s.tipo === "ACTIVO") {
                        totalCalle += parseFloat(s.saldo || 0);
                        totalGanancia += (parseFloat(s.monto || 0) * 0.20);

                        if(s.cuotas) {
                            s.cuotas.forEach(c => {
                                if(c.pagada && c.fecha) {
                                    if(c.fecha === hoy) totalHoy += parseFloat(c.valorPagado || 0);
                                    const partes = c.fecha.split('/');
                                    if(parseInt(partes[1]) - 1 === mesActual) totalMes += parseFloat(c.valorPagado || 0);
                                }
                            });
                        }

                        container.innerHTML += `
                            <div class="card p-5 flex justify-between items-center item-cliente" data-nombre="${s.nombre}">
                                <div>
                                    <h3 class="font-black uppercase text-slate-800 text-sm">${s.nombre}</h3>
                                    <p class="text-[10px] font-bold text-slate-400 italic">SALDO: $${parseFloat(s.saldo || 0).toFixed(2)}</p>
                                </div>
                                <button onclick="gestionarPago('${child.key}')" class="bg-sky-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Cobrar</button>
                            </div>`;
                    }
                });

                document.getElementById('stat-calle').innerText = `$${totalCalle.toFixed(2)}`;
                document.getElementById('stat-ganancia').innerText = `$${totalGanancia.toFixed(2)}`;
                document.getElementById('stat-hoy').innerText = `$${totalHoy.toFixed(2)}`;
                document.getElementById('stat-mes').innerText = `$${totalMes.toFixed(2)}`;
            });
        }

        // FUNCIÓN DE CIERRE MENSUAL
        async function ejecutarCierreMensual() {
            const clave = prompt("Para confirmar el CIERRE MENSUAL y archivar los datos, escribe: ARCHIVAR");
            if (clave !== "ARCHIVAR") return alert("Acción cancelada.");

            const snap = await db.ref('clientes').once('value');
            const dataActual = snap.val();
            const fechaCierre = new Date().toLocaleDateString('es-SV').replace(/\//g, '-');
            const mesNombre = new Intl.DateTimeFormat('es-ES', { month: 'long'}).format(new Date());

            // 1. Guardar una copia de seguridad en "cierres_mensuales"
            await db.ref('cierres_mensuales/' + fechaCierre).set({
                mes: mesNombre,
                fecha_ejecucion: fechaCierre,
                resumen: {
                    total_calle: document.getElementById('stat-calle').innerText,
                    total_recaudado: document.getElementById('stat-mes').innerText
                },
                datos_respaldo: dataActual
            });

            // 2. Limpiar las cuotas pagadas para que no cuenten en el nuevo mes
            // Nota: El saldo de los clientes se mantiene porque aún deben dinero, 
            // pero el contador de "Total Mes" se reiniciará porque las fechas ya no coincidirán con el nuevo mes.
            
            alert("✅ CICLO CERRADO. Los datos han sido archivados en Firebase y las estadísticas se reiniciarán para el nuevo mes.");
        }

        function cerrarModal() { document.getElementById('modalGestion').style.display = "none"; }
        function filtrarClientes() {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.item-cliente').forEach(item => {
                item.style.display = item.dataset.nombre.toLowerCase().includes(b) ? "flex" : "none";
            });
        }
        cargarDatos();
    </script>
</body>
</html>
