<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud | CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050b16] text-white font-sans">
    <main class="max-w-lg mx-auto px-6 py-12">
        <img src="logocredi.png" class="h-10 mx-auto mb-10 opacity-80" style="mix-blend-mode: lighten;">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-center mb-8">Solicitud de <span class="text-cyan-400">Crédito</span></h1>
        
        <form id="formSolicitud" class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre Completo" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl focus:border-cyan-500 outline-none">
            <input type="text" id="dui" placeholder="DUI (00000000-0)" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl focus:border-cyan-500 outline-none">
            <input type="tel" id="telefono" placeholder="WhatsApp" required class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl focus:border-cyan-500 outline-none">
            <select id="monto" class="w-full p-4 bg-[#1a1f2b] border border-white/10 rounded-2xl focus:border-cyan-500 outline-none">
                <option value="50">$50.00</option>
                <option value="100">$100.00</option>
                <option value="200">$200.00</option>
            </select>
            <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase tracking-widest rounded-2xl hover:scale-105 transition-all">Enviar Solicitud</button>
        </form>
    </main>

    <script>
        // Configuración de Firebase (Coloca tus credenciales aquí)
        const firebaseConfig = { projectId: "credilisto-sm", /* ...resto de config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('formSolicitud').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                dui: document.getElementById('dui').value,
                telefono: document.getElementById('telefono').value,
                monto: document.getElementById('monto').value,
                estado: 'pendiente',
                fecha: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('solicitudes').add(datos);
            window.location.href = 'enviado.html';
        });
    </script>
</body>
</html>
