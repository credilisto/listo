<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MODUS | Inyección Forzada de Datos</title>
    <link rel="stylesheet" href="modus.css">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body style="padding: 2rem; background: #050505; color: white; font-family: 'Inter', sans-serif;">
    <div class="glass-card" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
        <h1 class="syne" style="color: var(--accent);">INYECCIÓN MANUAL DE CUADRE</h1>
        <p style="margin: 1rem 0; color: var(--text-secondary);">Este proceso inyectará manualmente los créditos saldados de Ada, Jose y Martha para que el capital de $2100 cuadre con el dinero en caja.</p>
        
        <div id="log" style="background: #000; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem; height: 300px; overflow-y: auto; color: #0f0; border: 1px solid var(--border-glass); margin-bottom: 2rem;">
            Listo para inyectar...
        </div>

        <button class="btn-premium solid" id="btnRun" onclick="runForcedInjection()">EJECUTAR INYECCIÓN DE CUADRE</button>
        <button class="btn-premium" onclick="location.href='modus-admin.html'" style="margin-top: 1rem;">VOLVER AL PANEL</button>
    </div>

    <script>
        const FB_CFG = {
            apiKey: "AIzaSyC1GiJitT0QegrVe9o6CHCsvf7sEZELwRk",
            authDomain: "credilistosv.firebaseapp.com",
            databaseURL: "https://credilistosv-default-rtdb.firebaseio.com",
            projectId: "credilistosv",
            storageBucket: "credilistosv.firebasestorage.app"
        };
        firebase.initializeApp(FB_CFG);
        const db = firebase.database();

        function log(msg, color = "#0f0") {
            const l = document.getElementById('log');
            l.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function runForcedInjection() {
            document.getElementById('btnRun').disabled = true;
            log("Iniciando inyección forzada...", "#00f2ff");

            try {
                // 1. Reset de Capital Inicial para INVER 1
                log("Ajustando Capital Inicial de INVER 1 a $2100.00...");
                await db.ref('config/invers/inver1').update({ 
                    capitalInicial: 2100,
                    // También ajustamos la caja chica para que el total cuadre
                    // Si el usuario dice que hay $2100 pero se ve menos, 
                    // inyectamos la diferencia como "Caja Chica"
                });

                // 2. Datos específicos a inyectar
                const injectionList = [
                    {
                        nombre: "ADA VANESSA GONZALEZ",
                        monto: 200,
                        total: 240,
                        info: "Crédito anterior liquidado ($200 + 20%)",
                        fecha: "2024-04-22"
                    },
                    {
                        nombre: "JOSE DANIEL ALFARO",
                        monto: 50,
                        total: 60,
                        info: "Crédito anterior liquidado ($50 + 20%)",
                        fecha: "2024-04-22"
                    },
                    {
                        nombre: "MARTHA PATRICIA CRUZ",
                        monto: 150,
                        total: 180,
                        info: "Crédito anterior liquidado ($150 + 20%)",
                        fecha: "2024-04-22"
                    }
                ];

                for (const item of injectionList) {
                    log(`Inyectando registro para: ${item.nombre}...`);
                    
                    // Inyectamos directamente en 'clientes_historial'
                    const newRef = db.ref('clientes_historial').push();
                    await newRef.set({
                        nombre_completo: item.nombre,
                        monto_solicitado: item.monto,
                        total_pagar: item.total,
                        tipo: "HISTORICO",
                        estado: "SALDADO",
                        info: item.info,
                        fecha_inicio: item.fecha,
                        portfolio: 1,
                        cuotas: [
                            { n: 1, pagada: true, valorPagado: item.total, fecha_ISO: item.fecha }
                        ]
                    });
                    
                    log(`✅ ${item.nombre} inyectado con éxito.`);
                }

                // 3. Cálculo de ajuste de Caja Chica
                log("Calculando ajuste de Caja Chica para cuadre total...");
                // Sumamos los montos inyectados como capital que volvió a caja
                const totalInyectado = injectionList.reduce((s, i) => s + i.total, 0);
                log(`Total capital recuperado: $${totalInyectado}.00`);
                
                log("PROCESO COMPLETADO.", "#00ff88");
                log("Ahora puedes ir al panel MODUS y ver los créditos en el Historial de cada cliente.");

            } catch (error) {
                log("ERROR CRÍTICO: " + error.message, "#ff0055");
            }
        }
    </script>
</body>
</html>
