<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | CrediListo</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050b16] text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 bg-white/5 rounded-[40px] border border-white/10 shadow-2xl text-center">
        <img src="logocredi.png" alt="Logo" class="h-10 mx-auto mb-8 opacity-80">
        <h2 class="text-xl font-black uppercase italic mb-6 tracking-widest">Panel de Control</h2>
        <form action="gestionar.html" class="space-y-4">
            <input type="password" placeholder="PIN DE ACCESO" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-center font-black tracking-[0.5em] focus:outline-none focus:border-cyan-500 transition-colors">
            <button class="w-full py-4 bg-white text-[#050b16] rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-all">Entrar</button>
        </form>
    </div>
</body>
</html>
